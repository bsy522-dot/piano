<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>피아노 마스터 v4</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #0a0e1a; --surface: #141828; --surface2: #1a2036; --border: #1e2640;
  --text: #e8ecf4; --text2: #8892a8; --accent: #4a7dff;
  --green: #22c55e; --blue: #3b82f6; --red: #ef4444;
  --yellow: #eab308; --purple: #a855f7; --cyan: #06b6d4;
}
html, body { height:100%; background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; overflow:hidden; touch-action:manipulation; user-select:none; }
#app { display:flex; flex-direction:column; height:100%; }

/* Header */
.header { display:flex; align-items:center; justify-content:space-between; padding:6px 12px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; }
.header-title { font-size:14px; font-weight:700; background:linear-gradient(135deg,var(--accent),var(--purple)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.header-info { display:flex; gap:12px; font-size:11px; color:var(--text2); }
.midi-connected { color:var(--green) !important; }

/* Tabs */
.tabs { display:flex; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; z-index:10; }
.tab { flex:1; padding:10px 4px; text-align:center; cursor:pointer; font-size:13px; color:var(--text2); transition:all .2s; border-bottom:2px solid transparent; position:relative; }
.tab.active { color:var(--accent); border-bottom-color:var(--accent); background:rgba(74,125,255,.08); }
.tab:hover { background:rgba(74,125,255,.05); }
.tab-icon { font-size:16px; display:block; margin-bottom:2px; }

/* Content area */
.content { flex:1; overflow:hidden; position:relative; }
.panel { display:none; height:100%; flex-direction:column; }
.panel.active { display:flex; }

/* Piano container */
#piano-wrap { flex-shrink:0; background:#0d1117; padding:2px 0 0; position:relative; overflow-x:auto; overflow-y:hidden; border-top:1px solid var(--border); -webkit-overflow-scrolling:touch; }
#piano-wrap::-webkit-scrollbar { height:4px; }
#piano-wrap::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
#piano { display:flex; position:relative; height:130px; margin:0; }
.key-white { width:20px; height:130px; background:linear-gradient(180deg,#f5f5f5 0%,#e8e8e8 70%,#d8d8d8 100%); border:1px solid #888; border-top:none; border-radius:0 0 4px 4px; cursor:pointer; position:relative; z-index:1; flex-shrink:0; transition:background .06s; }
.key-white:active, .key-white.pressed { background:linear-gradient(180deg,#ccc,#bbb); box-shadow:inset 0 2px 6px rgba(0,0,0,.3); }
.key-white.hit-perfect { background:linear-gradient(180deg,#22c55e,#16a34a) !important; }
.key-white.hit-good { background:linear-gradient(180deg,#eab308,#ca8a04) !important; }
.key-white.hit-miss { background:linear-gradient(180deg,#ef4444,#dc2626) !important; }
.key-white.guide { background:linear-gradient(180deg,#93c5fd,#60a5fa) !important; }
.key-black { width:13px; height:82px; background:linear-gradient(180deg,#333 0%,#111 100%); border-radius:0 0 3px 3px; cursor:pointer; position:absolute; z-index:2; top:0; box-shadow:0 2px 4px rgba(0,0,0,.5); }
.key-black:active, .key-black.pressed { background:linear-gradient(180deg,#555,#333); }
.key-black.hit-perfect { background:linear-gradient(180deg,#16a34a,#15803d) !important; }
.key-black.hit-good { background:linear-gradient(180deg,#ca8a04,#a16207) !important; }
.key-black.hit-miss { background:linear-gradient(180deg,#dc2626,#b91c1c) !important; }
.key-black.guide { background:linear-gradient(180deg,#3b82f6,#2563eb) !important; }
.key-label { position:absolute; bottom:3px; left:50%; transform:translateX(-50%); font-size:7px; color:#999; pointer-events:none; white-space:nowrap; }
.key-black .key-label { color:#666; bottom:3px; font-size:6px; }

/* Falling notes canvas */
#synth-canvas { width:100%; flex:1; background:transparent; display:block; }

/* Controls common */
.ctrl-bar { display:flex; gap:6px; padding:6px 10px; flex-wrap:wrap; align-items:center; background:var(--surface); border-bottom:1px solid var(--border); font-size:12px; }
.ctrl-bar label { color:var(--text2); display:flex; align-items:center; gap:4px; }
.ctrl-bar select, .ctrl-bar input[type="range"] { background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:4px; padding:3px 6px; font-size:11px; }
.ctrl-bar input[type="range"] { width:70px; }
.ctrl-bar input[type="checkbox"] { accent-color:var(--accent); }

/* Buttons */
.btn { padding:5px 14px; border-radius:6px; border:none; cursor:pointer; font-size:12px; transition:all .15s; font-weight:500; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:#3a6de6; }
.btn-danger { background:var(--red); color:#fff; }
.btn-success { background:var(--green); color:#fff; }
.btn-secondary { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
.btn-back { background:none; color:var(--text2); border:1px solid var(--border); padding:4px 10px; }
.btn:disabled { opacity:.4; cursor:default; }

/* Score bar */
.score-bar { display:flex; gap:12px; padding:4px 10px; font-size:11px; color:var(--text2); background:var(--surface); border-bottom:1px solid var(--border); align-items:center; }
.score-bar span { display:flex; align-items:center; gap:3px; }
.s-perfect { color:var(--green); }
.s-good { color:var(--yellow); }
.s-miss { color:var(--red); }
.s-combo { color:var(--cyan); }

/* Learn panel */
.learn-list { padding:10px; overflow-y:auto; flex:1; }
.learn-section { margin-bottom:14px; }
.learn-section h3 { font-size:13px; color:var(--accent); margin-bottom:6px; padding-bottom:4px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:6px; }
.lesson-item { display:flex; justify-content:space-between; align-items:center; padding:8px 10px; margin-bottom:3px; background:var(--surface); border-radius:6px; cursor:pointer; transition:background .2s; }
.lesson-item:hover { background:rgba(74,125,255,.1); }
.lesson-item:active { background:rgba(74,125,255,.15); }
.lesson-item .stars { color:var(--yellow); font-size:12px; }
.lesson-item .l-name { font-size:12px; }
.badge { font-size:10px; padding:2px 6px; border-radius:10px; }
.badge-new { background:rgba(74,125,255,.2); color:var(--accent); }
.badge-done { background:rgba(34,197,94,.15); color:var(--green); }

/* Lesson view */
.lesson-view { padding:10px; display:none; flex-direction:column; flex:1; overflow-y:auto; }
.lesson-view.active { display:flex; }
.lesson-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; gap:8px; }
.lesson-header h2 { font-size:15px; flex:1; }
.lesson-desc { font-size:12px; color:var(--text2); margin-bottom:10px; line-height:1.5; background:var(--surface); padding:8px 10px; border-radius:6px; }
.lesson-actions { display:flex; gap:6px; flex-wrap:wrap; }

/* Record panel */
.rec-list { padding:10px; overflow-y:auto; flex:1; }
.rec-item { display:flex; justify-content:space-between; align-items:center; padding:8px 10px; margin-bottom:3px; background:var(--surface); border-radius:6px; font-size:12px; }
.rec-item-actions { display:flex; gap:4px; }
.rec-item-actions button { padding:3px 8px; font-size:11px; }
.rec-indicator { display:inline-flex; align-items:center; gap:4px; color:var(--red); font-size:12px; }
.rec-indicator .dot { width:8px; height:8px; border-radius:50%; background:var(--red); animation:blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

/* Free play info */
.free-info { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--text2); font-size:13px; gap:8px; padding:20px; text-align:center; }
.free-info .shortcut-grid { display:grid; grid-template-columns:1fr 1fr; gap:4px 16px; font-size:11px; text-align:left; margin-top:8px; }
.free-info kbd { background:var(--surface2); padding:1px 5px; border-radius:3px; border:1px solid var(--border); font-size:10px; font-family:monospace; }

/* Modal */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.65); z-index:100; align-items:center; justify-content:center; }
.modal-overlay.show { display:flex; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; max-width:380px; width:90%; text-align:center; }
.modal h3 { margin-bottom:10px; font-size:18px; }
.modal p { font-size:13px; color:var(--text2); margin-bottom:14px; line-height:1.6; }
.modal .stars-big { font-size:28px; color:var(--yellow); margin-bottom:8px; }
.modal .score-detail { font-size:12px; color:var(--text2); margin-bottom:12px; }

/* Scrollbar */
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

/* Responsive - mobile */
@media (max-width:600px) {
  .key-white { width:14px; height:105px; }
  .key-black { width:9px; height:66px; }
  #piano { height:105px; }
  .tab { font-size:10px; padding:6px 2px; }
  .tab-icon { font-size:14px; }
  .header { padding:4px 8px; }
  .header-title { font-size:12px; }
  .ctrl-bar { padding:4px 8px; font-size:11px; }
  .score-bar { padding:2px 6px; font-size:10px; gap:6px; }
  .lesson-item { padding:6px 8px; }
  .modal { padding:14px; max-width:320px; }
}
/* Galaxy Z Flip cover / ultra-narrow */
@media (max-width:300px) {
  .key-white { width:10px; height:80px; }
  .key-black { width:7px; height:52px; }
  #piano { height:80px; }
  .tab { font-size:9px; padding:4px 1px; }
  .tab-icon { font-size:12px; margin-bottom:0; }
  .header { padding:2px 4px; }
  .header-title { font-size:10px; }
  .header-info { font-size:9px; gap:6px; }
  .ctrl-bar { padding:2px 4px; gap:3px; font-size:10px; }
  .ctrl-bar select { padding:2px 3px; font-size:10px; }
  .ctrl-bar input[type="range"] { width:50px; }
  .score-bar { padding:2px 4px; font-size:9px; gap:4px; }
  .btn { padding:3px 8px; font-size:10px; }
  .learn-list { padding:6px; }
  .lesson-item { padding:5px 6px; margin-bottom:2px; }
  .lesson-item .l-name { font-size:11px; }
  .free-info { font-size:11px; padding:10px; }
  .modal { max-width:260px; padding:12px; }
  .modal h3 { font-size:15px; }
  .modal .stars-big { font-size:22px; }
}
</style>
</head>
<body>
<div id="audio-start-overlay" style="position:fixed;inset:0;z-index:9999;background:rgba(10,14,26,.95);display:flex;align-items:center;justify-content:center;flex-direction:column;cursor:pointer" onclick="ensureAudio();this.style.display='none'">
  <div style="font-size:60px;margin-bottom:16px">🎹</div>
  <div style="font-size:18px;color:#4a7dff;font-weight:700">터치하여 시작</div>
  <div style="font-size:12px;color:#8892a8;margin-top:8px">Tap to Start</div>
</div>
<div id="app">
  <div class="header">
    <span class="header-title">Piano Master v4</span>
    <div class="header-info">
      <span id="midi-status">MIDI: 대기</span>
      <span id="octave-display">C4</span>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" data-tab="free"><span class="tab-icon">🎹</span>연주</div>
    <div class="tab" data-tab="learn"><span class="tab-icon">📖</span>학습</div>
    <div class="tab" data-tab="synth"><span class="tab-icon">🎮</span>Synthesia</div>
    <div class="tab" data-tab="record"><span class="tab-icon">⏺</span>녹음</div>
  </div>

  <!-- Free Play -->
  <div class="panel active" id="panel-free">
    <div class="ctrl-bar">
      <label>옥타브 <select id="base-octave"><option value="2">2</option><option value="3" selected>3</option><option value="4">4</option><option value="5">5</option></select></label>
      <label>볼륨 <input type="range" id="volume" min="0" max="100" value="70"></label>
      <label>리버브 <input type="checkbox" id="reverb-toggle" checked></label>
    </div>
    <div class="free-info">
      <div>키보드로 연주하거나 건반을 터치하세요</div>
      <div class="shortcut-grid">
        <div><kbd>Z</kbd>~<kbd>M</kbd> 하단 옥타브</div>
        <div><kbd>Q</kbd>~<kbd>U</kbd> 상단 옥타브</div>
        <div><kbd>Space</kbd> 서스테인</div>
        <div><kbd>←</kbd><kbd>→</kbd> 스크롤</div>
      </div>
    </div>
  </div>

  <!-- Learn -->
  <div class="panel" id="panel-learn">
    <div class="learn-list" id="learn-list"></div>
    <div class="lesson-view" id="lesson-view">
      <div class="lesson-header">
        <button class="btn btn-back" id="btn-back-learn">← 목록</button>
        <h2 id="lesson-title"></h2>
        <span id="lesson-stars"></span>
      </div>
      <div class="lesson-desc" id="lesson-desc"></div>
      <div class="lesson-actions">
        <button class="btn btn-primary" id="btn-demo">▶ 데모</button>
        <button class="btn btn-success" id="btn-practice">🎯 연습</button>
        <button class="btn btn-danger" id="btn-test">⭐ 테스트</button>
      </div>
      <div style="flex:1"></div>
    </div>
  </div>

  <!-- Synthesia -->
  <div class="panel" id="panel-synth">
    <div class="ctrl-bar">
      <label>곡 <select id="song-select"></select></label>
      <label>속도 <input type="range" id="speed" min="30" max="200" value="100"><span id="speed-val">1.0x</span></label>
      <button class="btn btn-primary" id="btn-play-synth">▶ 재생</button>
      <button class="btn btn-secondary" id="btn-stop-synth">■ 정지</button>
      <label><input type="checkbox" id="auto-play"> 자동</label>
    </div>
    <div class="score-bar" id="synth-score" style="display:none">
      <span class="s-perfect">P:<b id="sc-perfect">0</b></span>
      <span class="s-good">G:<b id="sc-good">0</b></span>
      <span class="s-miss">M:<b id="sc-miss">0</b></span>
      <span class="s-combo">C:<b id="sc-combo">0</b></span>
      <span><b id="sc-total">0</b>pt</span>
      <span style="flex:1"></span>
      <span id="sc-progress" style="display:flex;align-items:center;gap:4px;min-width:80px">
        <span style="flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden"><span id="sc-progress-bar" style="display:block;height:100%;width:0%;background:var(--accent);border-radius:2px;transition:width .3s"></span></span>
        <span id="sc-progress-pct" style="font-size:10px">0%</span>
      </span>
    </div>
    <canvas id="synth-canvas"></canvas>
  </div>

  <!-- Record -->
  <div class="panel" id="panel-record">
    <div class="ctrl-bar">
      <button class="btn btn-danger" id="btn-rec-start">⏺ 녹음</button>
      <button class="btn btn-secondary" id="btn-rec-stop" disabled>⏹ 정지</button>
      <span class="rec-indicator" id="rec-indicator" style="display:none"><span class="dot"></span>녹음 중</span>
      <span style="flex:1"></span>
      <button class="btn btn-secondary" id="btn-rec-synth" disabled>🎮 Synthesia 재생</button>
    </div>
    <div class="rec-list" id="rec-list"></div>
  </div>

  <!-- Piano keyboard -->
  <div id="piano-wrap"><div id="piano"></div></div>
</div>

<div class="modal-overlay" id="result-modal">
  <div class="modal">
    <h3 id="result-title">결과</h3>
    <div class="stars-big" id="result-stars"></div>
    <p id="result-body"></p>
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
      <button class="btn btn-primary" id="btn-result-retry">🔄 재도전</button>
      <button class="btn btn-secondary" onclick="document.getElementById('result-modal').classList.remove('show')">확인</button>
    </div>
  </div>
</div>

<script>
// ================ CONSTANTS ================
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const WHITE_NOTES_SET = new Set(['C','D','E','F','G','A','B']);

function buildAllKeys() {
  const keys = [];
  // A0(21), A#0(22), B0(23)
  keys.push({note:'A',octave:0,midi:21},{note:'A#',octave:0,midi:22},{note:'B',octave:0,midi:23});
  for (let oct = 1; oct <= 7; oct++) {
    for (let i = 0; i < 12; i++) {
      keys.push({note:NOTE_NAMES[i], octave:oct, midi:12+oct*12+i});
    }
  }
  // C8(108)
  keys.push({note:'C',octave:8,midi:108});
  return keys;
}
const ALL_KEYS = buildAllKeys(); // 88 keys
const isBlack = n => n.includes('#');
const midiToFreq = midi => 440 * Math.pow(2, (midi - 69) / 12);
const noteName = k => k.note + k.octave;

// Fast lookup maps
const midiToKeyMap = new Map();
const nameToMidiMap = new Map();
ALL_KEYS.forEach(k => { midiToKeyMap.set(k.midi, k); nameToMidiMap.set(noteName(k), k.midi); });
const midiToName = midi => { const k = midiToKeyMap.get(midi); return k ? noteName(k) : ''; };
const nameToMidi = name => nameToMidiMap.get(name) || -1;

// ================ AUDIO ENGINE ================
let audioCtx, reverbNode, masterGain;
let audioReady = false;
function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 1;
    // Create convolution reverb (simple impulse)
    createReverb();
    masterGain.connect(audioCtx.destination);
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume().then(() => { audioReady = true; hideAudioOverlay(); });
  } else {
    audioReady = true;
    hideAudioOverlay();
  }
  return audioCtx;
}
function hideAudioOverlay(){
  const ov=document.getElementById('audio-start-overlay');
  if(ov)ov.style.display='none';
}

function createReverb() {
  try {
    reverbNode = audioCtx.createConvolver();
    const rate = audioCtx.sampleRate;
    const length = rate * 2.2; // longer tail for concert hall feel
    const impulse = audioCtx.createBuffer(2, length, rate);
    for (let ch = 0; ch < 2; ch++) {
      const data = impulse.getChannelData(ch);
      for (let i = 0; i < length; i++) {
        // Multi-decay: early reflections + late diffusion
        const t = i / length;
        const early = t < 0.05 ? Math.pow(1 - t / 0.05, 1.5) * 0.4 : 0;
        const late = Math.pow(1 - t, 3) * 0.25;
        data[i] = (Math.random() * 2 - 1) * (early + late);
      }
    }
    reverbNode.buffer = impulse;
    const wet = audioCtx.createGain();
    wet.gain.value = 0.18;
    reverbNode.connect(wet);
    wet.connect(audioCtx.destination);
    reverbNode._wetGain = wet;
  } catch(e) { reverbNode = null; }
}

const activeNotes = new Map();
let sustainOn = false;
const sustainedNotes = new Set();

function playNote(midi, velocity = 0.7) {
  const ctx = ensureAudio();
  const freq = midiToFreq(midi);
  const volSlider = parseInt(document.getElementById('volume').value) / 100;
  const vol = velocity * volSlider;
  const now = ctx.currentTime;

  // Stop existing
  if (activeNotes.has(midi)) stopNoteImmediate(midi);

  const noteGain = ctx.createGain();
  noteGain.connect(masterGain);
  const useReverb = document.getElementById('reverb-toggle').checked;
  if (useReverb && reverbNode) noteGain.connect(reverbNode);

  // Enhanced piano harmonics - register-dependent brightness & warmth
  const brightness = midi > 72 ? 0.6 : midi > 48 ? 1.0 : 1.3; // low=warm, high=bright
  const harmonics = [
    {r:1, g:1},
    {r:2, g:0.5 * brightness},
    {r:3, g:0.22 * brightness},
    {r:4, g:0.12 * brightness * (midi > 80 ? 0.5 : 1)},
    {r:5, g:0.06 * brightness * (midi > 75 ? 0.3 : 1)},
    {r:6, g:0.03 * brightness * (midi > 70 ? 0.2 : 1)},
    {r:7, g:0.015 * (midi < 60 ? 1 : 0.3)},
    {r:8, g:0.008 * (midi < 55 ? 1 : 0.1)},
  ];

  const oscs = harmonics.map(h => {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'sine';
    const f = freq * h.r;
    if (f > 16000) { osc.connect(g); g.connect(noteGain); osc.start(now); g.gain.value = 0; return {osc, gain:g}; }
    // Slight detuning for warmth (chorus effect)
    osc.frequency.value = f * (1 + (Math.random() - 0.5) * 0.001);
    // Velocity-sensitive: softer hits = less high harmonics
    const velScale = h.r > 3 ? Math.pow(velocity, 1.5) : 1;
    g.gain.value = h.g * vol * velScale;
    osc.connect(g);
    g.connect(noteGain);
    osc.start(now);
    return {osc, gain:g};
  });

  // String sympathetic resonance for bass notes
  if (midi < 52) {
    const resOsc = ctx.createOscillator();
    const resG = ctx.createGain();
    resOsc.type = 'sine';
    resOsc.frequency.value = freq * 0.5; // sub-octave
    resG.gain.value = vol * 0.04;
    resOsc.connect(resG); resG.connect(noteGain);
    resOsc.start(now);
    oscs.push({osc:resOsc, gain:resG});
  }

  // ADSR - register-adaptive envelope
  const attack = velocity > 0.8 ? 0.002 : 0.008; // harder = snappier attack
  const decay = midi > 72 ? 0.15 : midi > 48 ? 0.3 : 0.6; // lower = longer sustain
  const sustainLevel = midi > 72 ? 0.2 : midi > 48 ? 0.3 : 0.4;
  noteGain.gain.setValueAtTime(0, now);
  noteGain.gain.linearRampToValueAtTime(vol, now + attack);
  noteGain.gain.exponentialRampToValueAtTime(Math.max(vol * sustainLevel, 0.001), now + attack + decay);

  activeNotes.set(midi, {oscs, noteGain, startTime: now});

  // Visual
  const el = document.querySelector(`[data-midi="${midi}"]`);
  if (el) el.classList.add('pressed');

  // Recording hook
  if (isRecording) recordBuffer.push({midi, time: Date.now() - recordStart, type:'on'});
  // Synth hook
  if (onNoteCallback) onNoteCallback(midi);
}

function stopNote(midi) {
  if (sustainOn) { sustainedNotes.add(midi); return; }
  releaseNote(midi);
}

function releaseNote(midi) {
  const ctx = ensureAudio();
  const data = activeNotes.get(midi);
  if (!data) return;
  const now = ctx.currentTime;
  const rel = 0.4;
  data.noteGain.gain.cancelScheduledValues(now);
  data.noteGain.gain.setValueAtTime(data.noteGain.gain.value, now);
  data.noteGain.gain.exponentialRampToValueAtTime(0.001, now + rel);
  data.oscs.forEach(o => o.osc.stop(now + rel + 0.05));
  activeNotes.delete(midi);
  const el = document.querySelector(`[data-midi="${midi}"]`);
  if (el) el.classList.remove('pressed');
  if (isRecording) recordBuffer.push({midi, time: Date.now() - recordStart, type:'off'});
}

function stopNoteImmediate(midi) {
  const data = activeNotes.get(midi);
  if (!data) return;
  data.oscs.forEach(o => { try{o.osc.stop();}catch(e){} });
  activeNotes.delete(midi);
  const el = document.querySelector(`[data-midi="${midi}"]`);
  if (el) el.classList.remove('pressed');
}

function releaseSustain() { sustainedNotes.forEach(m => releaseNote(m)); sustainedNotes.clear(); }

// ================ PIANO KEYBOARD ================
let whiteKeyWidth = 20;
function buildPiano() {
  const piano = document.getElementById('piano');
  piano.innerHTML = '';
  const isMobile = window.innerWidth < 600;
  whiteKeyWidth = isMobile ? 14 : 20;
  const blackWidth = isMobile ? 9 : 13;
  const whiteHeight = isMobile ? 105 : 130;
  const blackHeight = isMobile ? 66 : 82;

  const whiteKeys = ALL_KEYS.filter(k => !isBlack(k.note));
  const totalWidth = whiteKeys.length * whiteKeyWidth;
  piano.style.width = totalWidth + 'px';
  piano.style.height = whiteHeight + 'px';

  // White keys
  whiteKeys.forEach(k => {
    const el = document.createElement('div');
    el.className = 'key-white';
    el.dataset.midi = k.midi;
    el.dataset.note = noteName(k);
    el.style.width = whiteKeyWidth + 'px';
    el.style.height = whiteHeight + 'px';
    if (k.note === 'C') {
      const lbl = document.createElement('span');
      lbl.className = 'key-label';
      lbl.textContent = 'C' + k.octave;
      el.appendChild(lbl);
    }
    piano.appendChild(el);
  });

  // Black keys
  const blackKeys = ALL_KEYS.filter(k => isBlack(k.note));
  blackKeys.forEach(k => {
    const prevWhiteCount = whiteKeys.filter(w => w.midi < k.midi).length;
    const el = document.createElement('div');
    el.className = 'key-black';
    el.dataset.midi = k.midi;
    el.dataset.note = noteName(k);
    el.style.width = blackWidth + 'px';
    el.style.height = blackHeight + 'px';
    el.style.left = (prevWhiteCount * whiteKeyWidth - blackWidth / 2) + 'px';
    piano.appendChild(el);
  });

  setupPianoTouch();
}

function setupPianoTouch() {
  const piano = document.getElementById('piano');
  const pointerNotes = new Map(); // pointerId -> midi

  piano.addEventListener('pointerdown', e => {
    const key = e.target.closest('[data-midi]');
    if (!key) return;
    e.preventDefault();
    const midi = parseInt(key.dataset.midi);
    pointerNotes.set(e.pointerId, midi);
    playNote(midi);
    key.setPointerCapture(e.pointerId);
  });

  piano.addEventListener('pointermove', e => {
    if (!pointerNotes.has(e.pointerId)) return;
    const el = document.elementFromPoint(e.clientX, e.clientY);
    if (!el) return;
    const key = el.closest('[data-midi]');
    if (!key) return;
    const midi = parseInt(key.dataset.midi);
    const prev = pointerNotes.get(e.pointerId);
    if (prev !== midi) {
      stopNote(prev);
      pointerNotes.set(e.pointerId, midi);
      playNote(midi);
    }
  });

  const endHandler = e => {
    const midi = pointerNotes.get(e.pointerId);
    if (midi !== undefined) {
      stopNote(midi);
      pointerNotes.delete(e.pointerId);
    }
  };
  piano.addEventListener('pointerup', endHandler);
  piano.addEventListener('pointercancel', endHandler);
}

// ================ KEYBOARD MAP ================
const keyboardMap = {};
function buildKeyMap() {
  const base = parseInt(document.getElementById('base-octave').value);
  Object.keys(keyboardMap).forEach(k => delete keyboardMap[k]);
  const whites = ['C','D','E','F','G','A','B'];
  // Lower row
  'ZXCVBNM'.split('').forEach((k,i) => { if(i<7){const m=nameToMidi(whites[i]+base);if(m>0)keyboardMap[k]=m;} });
  // Lower sharps: S=C#, D=D#, G=F#, H=G#, J=A#
  [['S','C#'],['D','D#'],['G','F#'],['H','G#'],['J','A#']].forEach(([k,n])=>{const m=nameToMidi(n+base);if(m>0)keyboardMap[k]=m;});
  // Upper row
  const o2 = base+1;
  'QWERTYU'.split('').forEach((k,i)=>{if(i<7){const m=nameToMidi(whites[i]+o2);if(m>0)keyboardMap[k]=m;}});
  [['2','C#'],['3','D#'],['5','F#'],['6','G#'],['7','A#']].forEach(([k,n])=>{const m=nameToMidi(n+o2);if(m>0)keyboardMap[k]=m;});
}

const heldKeys = new Set();
document.addEventListener('keydown', e => {
  if (e.repeat || e.target.tagName==='INPUT' || e.target.tagName==='SELECT') return;
  if (e.code === 'Space') { e.preventDefault(); sustainOn=true; return; }
  if (e.code === 'ArrowLeft') { e.preventDefault(); document.getElementById('piano-wrap').scrollLeft -= 80; return; }
  if (e.code === 'ArrowRight') { e.preventDefault(); document.getElementById('piano-wrap').scrollLeft += 80; return; }
  const k = e.key.toUpperCase();
  if (keyboardMap[k] && !heldKeys.has(k)) { heldKeys.add(k); playNote(keyboardMap[k]); }
});
document.addEventListener('keyup', e => {
  if (e.code === 'Space') { sustainOn=false; releaseSustain(); return; }
  const k = e.key.toUpperCase();
  if (keyboardMap[k]) { heldKeys.delete(k); stopNote(keyboardMap[k]); }
});
document.getElementById('base-octave').addEventListener('change', () => {
  buildKeyMap();
  document.getElementById('octave-display').textContent = 'C' + document.getElementById('base-octave').value;
});

// ================ MIDI INPUT ================
function initMIDI() {
  if (!navigator.requestMIDIAccess) return;
  navigator.requestMIDIAccess().then(access => {
    function onMsg(e) {
      const [status, note, vel] = e.data;
      const cmd = status & 0xf0;
      if (cmd === 0x90 && vel > 0) playNote(note, vel/127);
      else if (cmd === 0x80 || (cmd===0x90 && vel===0)) stopNote(note);
      else if (cmd === 0xb0 && note === 64) { if(vel>=64){sustainOn=true;}else{sustainOn=false;releaseSustain();} }
    }
    function connect() {
      const inputs = Array.from(access.inputs.values());
      const el = document.getElementById('midi-status');
      if (inputs.length) { el.textContent='MIDI: '+inputs[0].name; el.classList.add('midi-connected'); }
      else { el.textContent='MIDI: 대기'; el.classList.remove('midi-connected'); }
      inputs.forEach(inp => { inp.onmidimessage = onMsg; });
    }
    connect();
    access.onstatechange = connect;
  }).catch(()=>{});
}

  const categories = [

    {title:'🎹 클래식 초급~중급', ids:['s6','s7','s8']},
    {title:'🎼 클래식 중급', ids:['s9','s10','s11','s12','s13']},

    {title:'🎶 연주곡', ids:['s21','s22']},

  categories.forEach(cat => {
    const items = cat.ids.map(id => LESSONS.songs.find(l => l.id === id)).filter(Boolean);
    if (!items.length) return;
    html += `<div class="learn-section"><h3>${cat.title}</h3>`;
    items.forEach(l => {
      const stars = getLessonStars(l.id);
      const starStr = stars > 0 ? '★'.repeat(stars) + '☆'.repeat(3-stars) : '';
      html += `<div class="lesson-item" data-lesson="${l.id}"><span class="l-name">${l.name}</span><span>${starStr ? '<span class="stars">'+starStr+'</span>' : '<span class="badge badge-new">NEW</span>'}</span></div>`;

// ================ SYNTHESIA ENGINE ================
let synthRunning = false, synthAnimId = null;
let synthPaused = false, synthPauseTime = 0; // pause-on-miss
let synthPracticeMode = false; // practice = pause on miss
let synthNotes = [], synthBPM = 120, synthSpeed = 1, synthAutoPlay = false;
let synthStartTime = 0, synthTestId = null;
let synthScore = {perfect:0, good:0, miss:0, combo:0, maxCombo:0};
let onNoteCallback = null;
let particles = []; // visual particles for hit effects
let judgmentTexts = []; // floating judgment texts

function resizeSynthCanvas() {
  const canvas = document.getElementById('synth-canvas');
  if (!canvas || !canvas.parentElement) return;
  const rect = canvas.parentElement.getBoundingClientRect();
  const ctrlBars = canvas.parentElement.querySelectorAll('.ctrl-bar, .score-bar');
  let usedHeight = 0;
  ctrlBars.forEach(b => usedHeight += b.offsetHeight);
  const h = rect.height - usedHeight;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = Math.max(h, 100) * dpr;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = Math.max(h, 100) + 'px';
}

function getKeyX(noteName) {
  const midi = nameToMidi(noteName);
  const el = document.querySelector(`[data-midi="${midi}"]`);
  if (!el) return null;
  const pianoWrap = document.getElementById('piano-wrap');
  const pianoRect = pianoWrap.getBoundingClientRect();
  const keyRect = el.getBoundingClientRect();
  return {
    x: keyRect.left - pianoRect.left + pianoWrap.scrollLeft,
    width: keyRect.width,
    isBlack: el.classList.contains('key-black')
  };
}

function startSynthesia(notes, bpm, autoPlay, testId) {
  // Switch to synth tab
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector('[data-tab="synth"]').classList.add('active');
  document.getElementById('panel-synth').classList.add('active');

  stopSynthesia();
  setTimeout(() => resizeSynthCanvas(), 50);

  synthNotes = notes.map((n,i) => ({...n, idx:i, played:false, result:null}));
  synthBPM = bpm;
  synthSpeed = parseInt(document.getElementById('speed').value) / 100;
  synthAutoPlay = autoPlay;
  synthTestId = testId;
  synthScore = {perfect:0, good:0, miss:0, combo:0, maxCombo:0};
  particles = [];
  judgmentTexts = [];

  document.getElementById('sc-perfect').textContent = '0';
  document.getElementById('sc-good').textContent = '0';
  document.getElementById('sc-miss').textContent = '0';
  document.getElementById('sc-combo').textContent = '0';
  document.getElementById('sc-total').textContent = '0';
  document.getElementById('synth-score').style.display = 'flex';

  // Auto-scroll piano to fit the song range
  const midiValues = notes.map(n => nameToMidi(n.note)).filter(m => m > 0);
  if (midiValues.length) {
    const midMidi = Math.round((Math.min(...midiValues) + Math.max(...midiValues)) / 2);
    scrollToMidi(midMidi);
  }

  synthStartTime = performance.now() + 1500; // 1.5s lead-in
  synthRunning = true;
  synthPaused = false; synthPauseTime = 0;

  if (!autoPlay) {
    onNoteCallback = (midi) => {
      const name = midiToName(midi);
      const now = (performance.now() - synthStartTime) / 1000;
      const beatToSec = 60 / (synthBPM * synthSpeed);

      let best = null, bestDiff = Infinity;
      synthNotes.forEach(n => {
        if (n.played || n.note !== name) return;
        const diff = Math.abs(now - n.time * beatToSec);
        if (diff < bestDiff && diff < 1.5) { bestDiff = diff; best = n; }
      });

      if (best) {
        best.played = true;
        if (bestDiff < 0.12) { best.result='perfect'; synthScore.perfect++; synthScore.combo++; }
        else if (bestDiff < 0.35) { best.result='good'; synthScore.good++; synthScore.combo++; }
        else { best.result='miss'; synthScore.miss++; synthScore.combo=0; }
        synthScore.maxCombo = Math.max(synthScore.maxCombo, synthScore.combo);

        // Particles
        const keyInfo = getKeyX(best.note);
        if (keyInfo) {
          const pianoWrap = document.getElementById('piano-wrap');
          const canvas = document.getElementById('synth-canvas');
          const canvasToKeyScale = canvas.width / pianoWrap.clientWidth;
          const dpr = window.devicePixelRatio || 1;
          const kx = (keyInfo.x - pianoWrap.scrollLeft) * canvasToKeyScale * dpr;
          const kw = keyInfo.width * canvasToKeyScale * dpr;
          const color = best.result==='perfect' ? '#22c55e' : best.result==='good' ? '#eab308' : '#ef4444';
          for (let p=0;p<8;p++) {
            particles.push({x:kx+kw/2, y:canvas.height-10*dpr, vx:(Math.random()-.5)*4*dpr, vy:-Math.random()*6*dpr, life:1, color, size:3*dpr});
          }
          // Judgment text
          const label = best.result==='perfect' ? 'PERFECT!' : best.result==='good' ? 'GOOD' : 'MISS';
          judgmentTexts.push({text:label, x:kx+kw/2, y:canvas.height-40*dpr, life:1, color});
        }

        // Flash key
        const el = document.querySelector(`[data-midi="${midi}"]`);
        if (el) { el.classList.add('hit-'+best.result); setTimeout(()=>el.classList.remove('hit-perfect','hit-good','hit-miss'),300); }

        document.getElementById('sc-perfect').textContent = synthScore.perfect;
        document.getElementById('sc-good').textContent = synthScore.good;
        document.getElementById('sc-miss').textContent = synthScore.miss;
        document.getElementById('sc-combo').textContent = synthScore.combo;
        document.getElementById('sc-total').textContent = synthScore.perfect*100 + synthScore.good*50;
        // Update progress bar
        const played = synthNotes.filter(n=>n.played).length;
        const pct = Math.round(played / synthNotes.length * 100);
        document.getElementById('sc-progress-bar').style.width = pct + '%';
        document.getElementById('sc-progress-pct').textContent = pct + '%';
      }
    };
  }

  synthAnimId = requestAnimationFrame(synthLoop);
}

function pauseSynthesia(missedNote) {
  if (!synthPracticeMode || synthPaused) return;
  synthPaused = true;
  synthPauseTime = performance.now();
  // Show pause overlay on canvas
  const canvas = document.getElementById('synth-canvas');
  const ctx2 = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  ctx2.fillStyle = 'rgba(0,0,0,0.6)';
  ctx2.fillRect(0, 0, canvas.width, canvas.height);
  ctx2.fillStyle = '#ef4444';
  ctx2.font = `bold ${18*dpr}px sans-serif`;
  ctx2.textAlign = 'center';
  ctx2.fillText('MISS! 터치하여 계속', canvas.width/2, canvas.height/2 - 10*dpr);
  if (missedNote) {
    ctx2.fillStyle = '#eab308';
    ctx2.font = `${13*dpr}px sans-serif`;
    ctx2.fillText(`정답: ${missedNote}`, canvas.width/2, canvas.height/2 + 20*dpr);
  }
}

function resumeSynthesia() {
  if (!synthPaused) return;
  const elapsed = performance.now() - synthPauseTime;
  synthStartTime += elapsed; // compensate for paused time
  synthPaused = false;
  synthAnimId = requestAnimationFrame(synthLoop);
}

function synthLoop() {
  if (!synthRunning) return;
  if (synthPaused) return; // frozen while paused
  const canvas = document.getElementById('synth-canvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const dpr = window.devicePixelRatio || 1;

  ctx.clearRect(0, 0, W, H);

  // Background grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  const pianoWrap = document.getElementById('piano-wrap');
  const scrollLeft = pianoWrap.scrollLeft;
  const canvasToKeyScale = W / pianoWrap.clientWidth;

  // Draw vertical lines for each C key
  ALL_KEYS.filter(k=>k.note==='C').forEach(k=>{
    const el = document.querySelector(`[data-midi="${k.midi}"]`);
    if(!el) return;
    const pianoRect = pianoWrap.getBoundingClientRect();
    const keyRect = el.getBoundingClientRect();
    const x = (keyRect.left - pianoRect.left + pianoWrap.scrollLeft - scrollLeft) * canvasToKeyScale * dpr;
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
  });

  const now = (performance.now() - synthStartTime) / 1000;
  const beatToSec = 60 / (synthBPM * synthSpeed);
  const pxPerSec = H * 0.55;

  let allDone = true;
  let hasUnplayed = false;

  synthNotes.forEach(n => {
    const noteTimeSec = n.time * beatToSec;
    const noteDurSec = n.duration * beatToSec;
    const keyInfo = getKeyX(n.note);
    if (!keyInfo) return;

    const noteBottom = H - (noteTimeSec - now) * pxPerSec * dpr;
    const noteHeight = Math.max(noteDurSec * pxPerSec * dpr, 6*dpr);
    const noteTop = noteBottom - noteHeight;

    // Off screen below = missed
    if (noteTop > H + 50*dpr) {
      if (!n.played && !synthAutoPlay) {
        n.played = true; n.result = 'miss'; synthScore.miss++; synthScore.combo=0;
        document.getElementById('sc-miss').textContent = synthScore.miss;
        document.getElementById('sc-combo').textContent = synthScore.combo;
        if (synthPracticeMode) { pauseSynthesia(n.note); return; }
      }
      return;
    }
    if (noteBottom < -100*dpr) { allDone = false; return; }
    if (!n.played) hasUnplayed = true;
    allDone = false;

    const keyX = (keyInfo.x - scrollLeft) * canvasToKeyScale * dpr;
    const keyW = keyInfo.width * canvasToKeyScale * dpr;

    // Color
    let color, glow;
    if (n.result==='perfect') { color='rgba(34,197,94,0.6)'; glow='#22c55e'; }
    else if (n.result==='good') { color='rgba(234,179,8,0.6)'; glow='#eab308'; }
    else if (n.result==='miss') { color='rgba(239,68,68,0.4)'; glow='#ef4444'; }
    else if (n.hand==='L') { color='rgba(59,130,246,0.85)'; glow='#3b82f6'; }
    else { color='rgba(34,197,94,0.85)'; glow='#22c55e'; }

    const drawY = Math.min(noteTop, noteBottom - noteHeight);
    const r = 4*dpr;
    const x = keyX+1, y = drawY, w = Math.max(keyW-2,2), h = noteHeight;

    // Glow for upcoming notes
    if (!n.played && Math.abs(noteBottom - H) < 60*dpr) {
      ctx.shadowColor = glow;
      ctx.shadowBlur = 15*dpr;
    }

    // Draw rounded rect
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Note label
    if (h > 16*dpr) {
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.font = `bold ${9*dpr}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText(n.note, x+w/2, drawY+h/2+3*dpr);
    }

    // Auto-play
    if (synthAutoPlay && !n.played && noteBottom >= H - 5*dpr) {
      n.played = true;
      const midi = nameToMidi(n.note);
      if (midi>0) {
        playNote(midi, 0.7);
        setTimeout(()=>stopNote(midi), noteDurSec*1000);
        const el = document.querySelector(`[data-midi="${midi}"]`);
        if (el) { el.classList.add('guide'); setTimeout(()=>el.classList.remove('guide'), noteDurSec*1000); }
      }
    }

    // Guide highlight for play-along
    if (!synthAutoPlay && !n.played && noteBottom > H-80*dpr && noteBottom < H+20*dpr) {
      const el = document.querySelector(`[data-midi="${nameToMidi(n.note)}"]`);
      if (el && !el.classList.contains('pressed')) { el.classList.add('guide'); setTimeout(()=>el.classList.remove('guide'),150); }
    }
  });

  // Hit line
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 2*dpr;
  ctx.setLineDash([8*dpr, 4*dpr]);
  ctx.beginPath(); ctx.moveTo(0, H-2*dpr); ctx.lineTo(W, H-2*dpr); ctx.stroke();
  ctx.setLineDash([]);

  // Particles
  particles = particles.filter(p => {
    p.life -= 0.025;
    if (p.life <= 0) return false;
    p.x += p.vx; p.y += p.vy; p.vy += 0.15*dpr;
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x-p.size/2, p.y-p.size/2, p.size, p.size);
    ctx.globalAlpha = 1;
    return true;
  });

  // Judgment texts
  judgmentTexts = judgmentTexts.filter(j => {
    j.life -= 0.02;
    if (j.life <= 0) return false;
    j.y -= 1.5*dpr;
    ctx.globalAlpha = j.life;
    ctx.fillStyle = j.color;
    ctx.font = `bold ${14*dpr}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(j.text, j.x, j.y);
    ctx.globalAlpha = 1;
    return true;
  });

  // Progress bar update (for autoplay mode too)
  if (synthAutoPlay) {
    const played = synthNotes.filter(n=>n.played).length;
    const pct = Math.round(played / synthNotes.length * 100);
    const pbar = document.getElementById('sc-progress-bar');
    if (pbar) { pbar.style.width = pct + '%'; document.getElementById('sc-progress-pct').textContent = pct + '%'; }
  }

  // Combo display
  if (!synthAutoPlay && synthScore.combo >= 5) {
    ctx.fillStyle = 'rgba(6,182,212,0.8)';
    ctx.font = `bold ${20*dpr}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(synthScore.combo + ' COMBO', W/2, 40*dpr);
  }

  if ((allDone && now > 2) || (!hasUnplayed && synthNotes.every(n=>n.played))) {
    synthRunning = false;
    onNoteCallback = null;
    if (synthTestId) {
      const total = synthNotes.length;
      const pct = (synthScore.perfect + synthScore.good * 0.5) / total;
      let stars = 0;
      if (pct >= 0.9) stars = 3;
      else if (pct >= 0.7) stars = 2;
      else if (pct >= 0.4) stars = 1;
      setLessonStars(synthTestId, stars);
      document.getElementById('result-title').textContent = '테스트 결과';
      document.getElementById('result-stars').textContent = '★'.repeat(stars) + '☆'.repeat(3-stars);
      document.getElementById('result-body').innerHTML =
        `<div class="score-detail">Perfect: ${synthScore.perfect} / Good: ${synthScore.good} / Miss: ${synthScore.miss}<br>최대 콤보: ${synthScore.maxCombo}<br>점수: ${synthScore.perfect*100+synthScore.good*50}</div>`;
      document.getElementById('result-modal').classList.add('show');
      // Retry button: re-run the same test
      const _testId = synthTestId;
      const _notes = synthNotes.map(n => ({note:n.note,time:n.time,duration:n.duration,hand:n.hand}));
      document.getElementById('btn-result-retry').onclick = () => {
        document.getElementById('result-modal').classList.remove('show');
        startSynthesia(_notes, synthBPM, false, _testId);
      };
      // Refresh learn list stars
      renderLearnList();
    }
    return;
  }

  synthAnimId = requestAnimationFrame(synthLoop);
}

function stopSynthesia() {
  synthRunning = false;
  if (synthAnimId) cancelAnimationFrame(synthAnimId);
  onNoteCallback = null;
  particles = []; judgmentTexts = [];
  const canvas = document.getElementById('synth-canvas');
  if (canvas) { const c=canvas.getContext('2d'); if(c) c.clearRect(0,0,canvas.width,canvas.height); }
  document.querySelectorAll('.guide,.hit-perfect,.hit-good,.hit-miss').forEach(el => {
    el.classList.remove('guide','hit-perfect','hit-good','hit-miss');
  });
}

function scrollToMidi(midi) {
  const el = document.querySelector(`[data-midi="${midi}"]`);
  if (!el) return;
  const wrap = document.getElementById('piano-wrap');
  const wrapW = wrap.clientWidth;
  wrap.scrollLeft = el.offsetLeft - wrapW/2 + el.offsetWidth/2;
}

// Synthesia controls
// Click canvas to resume from practice-mode pause
document.getElementById('synth-canvas').addEventListener('click', () => { if (synthPaused) resumeSynthesia(); });

document.getElementById('btn-play-synth').addEventListener('click', () => {
  synthPracticeMode = false;
  const songKey = document.getElementById('song-select').value;
  const song = SONGS[songKey];
  if (!song) return;
  startSynthesia(song.notes, song.bpm, document.getElementById('auto-play').checked, null);
});
document.getElementById('btn-stop-synth').addEventListener('click', stopSynthesia);
document.getElementById('speed').addEventListener('input', e => {
  document.getElementById('speed-val').textContent = (e.target.value/100).toFixed(1)+'x';
});

// Populate song select with categories
(function(){
  const sel = document.getElementById('song-select');
  const groups = [
    {label:'동요/찬송가', keys:['비행기','학교종','작은별','곰세마리','AmazingGrace','clementine']},
    {label:'클래식 초중급', keys:['ode_to_joy','minuet_g','humoresque']},
    {label:'클래식 중급', keys:['엘리제','캐논','air_on_g','traumerei','swan_lake']},
    {label:'클래식 상급', keys:['turkish_march','moonlight','nocturne','spring','liebestraum','hungarian5']},
    {label:'연주곡', keys:['river_flows','la_campanella']},
  ];
  groups.forEach(g => {
    const og = document.createElement('optgroup');
    og.label = g.label;
    g.keys.forEach(key => {
      if (!SONGS[key]) return;
      const opt = document.createElement('option');
      opt.value = key; opt.textContent = SONGS[key].name;
      og.appendChild(opt);
    });
    sel.appendChild(og);
  });
})();

// ================ RECORDING ================
let isRecording = false, recordStart = 0, recordBuffer = [];
let recordings = JSON.parse(localStorage.getItem('piano-v3-recordings') || '[]');
let selectedRecIdx = -1;

function renderRecordings() {
  const el = document.getElementById('rec-list');
  const synthBtn = document.getElementById('btn-rec-synth');
  if (recordings.length === 0) {
    el.innerHTML = '<p style="color:var(--text2);padding:20px;text-align:center;font-size:13px">녹음이 없습니다.<br>녹음 버튼을 눌러 연주를 저장하세요.</p>';
    synthBtn.disabled = true;
    return;
  }
  el.innerHTML = recordings.map((r,i) => `
    <div class="rec-item${selectedRecIdx===i?' style="border:1px solid var(--accent)"':''}">
      <label style="cursor:pointer;flex:1;display:flex;align-items:center;gap:6px">
        <input type="radio" name="rec-sel" value="${i}" ${selectedRecIdx===i?'checked':''} style="accent-color:var(--accent)">
        ${r.name} (${(r.duration/1000).toFixed(1)}초, ${r.noteCount}음)
      </label>
      <div class="rec-item-actions">
        <button class="btn btn-primary" onclick="playRecording(${i})">▶</button>
        <button class="btn btn-secondary" onclick="deleteRecording(${i})" style="color:var(--red)">✕</button>
      </div>
    </div>
  `).join('');

  el.querySelectorAll('input[name="rec-sel"]').forEach(radio => {
    radio.addEventListener('change', () => {
      selectedRecIdx = parseInt(radio.value);
      synthBtn.disabled = false;
      renderRecordings();
    });
  });
  synthBtn.disabled = selectedRecIdx < 0 || selectedRecIdx >= recordings.length;
}

document.getElementById('btn-rec-start').addEventListener('click', () => {
  isRecording = true; recordStart = Date.now(); recordBuffer = [];
  document.getElementById('btn-rec-start').disabled = true;
  document.getElementById('btn-rec-stop').disabled = false;
  document.getElementById('rec-indicator').style.display = 'inline-flex';
});

document.getElementById('btn-rec-stop').addEventListener('click', () => {
  isRecording = false;
  document.getElementById('btn-rec-start').disabled = false;
  document.getElementById('btn-rec-stop').disabled = true;
  document.getElementById('rec-indicator').style.display = 'none';
  if (recordBuffer.length > 0) {
    const duration = Date.now() - recordStart;
    const noteCount = recordBuffer.filter(e=>e.type==='on').length;
    const name = `녹음 ${recordings.length+1} (${new Date().toLocaleTimeString('ko-KR')})`;
    recordings.push({name, duration, noteCount, events: recordBuffer});
    localStorage.setItem('piano-v3-recordings', JSON.stringify(recordings));
    renderRecordings();
  }
});

// Play back recording on piano
window.playRecording = function(idx) {
  const rec = recordings[idx];
  if (!rec) return;
  rec.events.forEach(ev => {
    setTimeout(() => { if(ev.type==='on') playNote(ev.midi,0.7); else stopNote(ev.midi); }, ev.time);
  });
};

// Play recording as Synthesia falling notes
document.getElementById('btn-rec-synth').addEventListener('click', () => {
  if (selectedRecIdx < 0 || selectedRecIdx >= recordings.length) return;
  const rec = recordings[selectedRecIdx];
  // Convert recording events to synthesia note format
  const noteOns = {};
  const notes = [];
  rec.events.forEach(ev => {
    if (ev.type === 'on') {
      noteOns[ev.midi] = ev.time;
    } else if (ev.type === 'off' && noteOns[ev.midi] !== undefined) {
      const startMs = noteOns[ev.midi];
      const durMs = ev.time - startMs;
      const name = midiToName(ev.midi);
      if (name) {
        // Convert ms to beats at 120 BPM: 1 beat = 500ms
        notes.push({note:name, time:startMs/500, duration:Math.max(durMs/500, 0.2), hand:'R'});
      }
      delete noteOns[ev.midi];
    }
  });
  if (notes.length > 0) {
    startSynthesia(notes, 120, true, null);
  }
});

window.deleteRecording = function(idx) {
  recordings.splice(idx, 1);
  if (selectedRecIdx >= recordings.length) selectedRecIdx = -1;
  localStorage.setItem('piano-v3-recordings', JSON.stringify(recordings));
  renderRecordings();
};

// ================ INIT ================
function init() {
  buildPiano();
  buildKeyMap();
  initMIDI();
  renderLearnList();
  renderRecordings();

  // Scroll to middle C
  setTimeout(() => {
    scrollToMidi(60); // C4
    resizeSynthCanvas();
  }, 100);
}

window.addEventListener('resize', () => {
  buildPiano();
  resizeSynthCanvas();
  scrollToMidi(60);
});
window.addEventListener('load', init);
</script>
