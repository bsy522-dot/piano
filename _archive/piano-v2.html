<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>피아노 마스터 v2</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #0a0e1a; --surface: #141828; --border: #1e2640;
  --text: #e8ecf4; --text2: #8892a8; --accent: #4a7dff;
  --green: #22c55e; --blue: #3b82f6; --red: #ef4444;
  --yellow: #eab308; --purple: #a855f7;
}
html, body { height:100%; background:var(--bg); color:var(--text); font-family:'Segoe UI',sans-serif; overflow:hidden; touch-action:manipulation; user-select:none; }
#app { display:flex; flex-direction:column; height:100%; }

/* Tabs */
.tabs { display:flex; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; z-index:10; }
.tab { flex:1; padding:10px 4px; text-align:center; cursor:pointer; font-size:13px; color:var(--text2); transition:all .2s; border-bottom:2px solid transparent; }
.tab.active { color:var(--accent); border-bottom-color:var(--accent); background:rgba(74,125,255,.08); }
.tab:hover { background:rgba(74,125,255,.05); }

/* Content area */
.content { flex:1; overflow-y:auto; position:relative; }
.panel { display:none; height:100%; flex-direction:column; }
.panel.active { display:flex; }

/* Piano container */
#piano-wrap { flex-shrink:0; background:#111; padding:4px 0; position:relative; overflow-x:auto; }
#piano { display:flex; position:relative; height:140px; margin:0 auto; }
.key-white { width:22px; height:140px; background:linear-gradient(180deg,#f8f8f8,#e8e8e8); border:1px solid #999; border-radius:0 0 4px 4px; cursor:pointer; position:relative; z-index:1; flex-shrink:0; transition:background .05s; }
.key-white:active, .key-white.pressed { background:linear-gradient(180deg,#ddd,#ccc); }
.key-white.hit-perfect { background:linear-gradient(180deg,#22c55e,#16a34a) !important; }
.key-white.hit-good { background:linear-gradient(180deg,#eab308,#ca8a04) !important; }
.key-white.hit-miss { background:linear-gradient(180deg,#ef4444,#dc2626) !important; }
.key-white.left-hand { background:linear-gradient(180deg,#93c5fd,#60a5fa) !important; }
.key-white.right-hand { background:linear-gradient(180deg,#86efac,#4ade80) !important; }
.key-black { width:14px; height:90px; background:linear-gradient(180deg,#222,#111); border-radius:0 0 3px 3px; cursor:pointer; position:absolute; z-index:2; top:0; }
.key-black:active, .key-black.pressed { background:linear-gradient(180deg,#444,#333); }
.key-black.hit-perfect { background:linear-gradient(180deg,#16a34a,#15803d) !important; }
.key-black.hit-good { background:linear-gradient(180deg,#ca8a04,#a16207) !important; }
.key-black.hit-miss { background:linear-gradient(180deg,#dc2626,#b91c1c) !important; }
.key-black.left-hand { background:linear-gradient(180deg,#3b82f6,#2563eb) !important; }
.key-black.right-hand { background:linear-gradient(180deg,#22c55e,#16a34a) !important; }
.key-label { position:absolute; bottom:4px; left:50%; transform:translateX(-50%); font-size:8px; color:#888; pointer-events:none; }
.key-black .key-label { color:#888; bottom:4px; }

/* Falling notes canvas */
#synth-canvas { width:100%; background:transparent; }

/* Status bar */
.status-bar { display:flex; justify-content:space-between; padding:6px 12px; background:var(--surface); border-bottom:1px solid var(--border); font-size:12px; color:var(--text2); flex-shrink:0; }
.status-bar .midi-status { color:var(--green); }

/* Free play panel */
.free-controls { display:flex; gap:8px; padding:8px 12px; flex-wrap:wrap; align-items:center; background:var(--surface); border-bottom:1px solid var(--border); }
.free-controls label { font-size:12px; color:var(--text2); }
.free-controls select, .free-controls input { background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:4px; padding:4px 8px; font-size:12px; }

/* Learn panel */
.learn-list { padding:12px; overflow-y:auto; flex:1; }
.learn-section { margin-bottom:16px; }
.learn-section h3 { font-size:14px; color:var(--accent); margin-bottom:8px; padding-bottom:4px; border-bottom:1px solid var(--border); }
.lesson-item { display:flex; justify-content:space-between; align-items:center; padding:8px 12px; margin-bottom:4px; background:var(--surface); border-radius:6px; cursor:pointer; transition:background .2s; }
.lesson-item:hover { background:rgba(74,125,255,.1); }
.lesson-item .stars { color:var(--yellow); }
.lesson-item .status { font-size:11px; padding:2px 8px; border-radius:10px; }
.lesson-item .status.done { background:rgba(34,197,94,.2); color:var(--green); }
.lesson-item .status.new { background:rgba(74,125,255,.2); color:var(--accent); }
.lesson-view { padding:12px; display:none; flex-direction:column; flex:1; }
.lesson-view.active { display:flex; }
.lesson-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.lesson-header h2 { font-size:16px; }
.btn { padding:6px 16px; border-radius:6px; border:none; cursor:pointer; font-size:13px; transition:all .2s; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:#3a6de6; }
.btn-secondary { background:var(--surface); color:var(--text); border:1px solid var(--border); }
.btn-back { background:none; color:var(--text2); border:1px solid var(--border); }
.lesson-desc { font-size:13px; color:var(--text2); margin-bottom:12px; line-height:1.5; }
.lesson-actions { display:flex; gap:8px; flex-wrap:wrap; }

/* Synthesia panel */
.synth-controls { display:flex; gap:8px; padding:8px 12px; flex-wrap:wrap; align-items:center; background:var(--surface); border-bottom:1px solid var(--border); }
.synth-controls select, .synth-controls input { background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:4px; padding:4px 8px; font-size:12px; }
.synth-score { display:flex; gap:16px; padding:4px 12px; font-size:12px; color:var(--text2); background:var(--surface); border-bottom:1px solid var(--border); }
.synth-score span { display:flex; align-items:center; gap:4px; }
.score-perfect { color:var(--green); }
.score-good { color:var(--yellow); }
.score-miss { color:var(--red); }

/* Record panel */
.rec-controls { display:flex; gap:8px; padding:8px 12px; flex-wrap:wrap; align-items:center; background:var(--surface); border-bottom:1px solid var(--border); }
.rec-list { padding:12px; overflow-y:auto; flex:1; }
.rec-item { display:flex; justify-content:space-between; align-items:center; padding:8px 12px; margin-bottom:4px; background:var(--surface); border-radius:6px; }
.rec-item-actions { display:flex; gap:4px; }
.rec-item-actions button { padding:4px 8px; font-size:11px; }
.recording-indicator { display:inline-flex; align-items:center; gap:4px; color:var(--red); font-size:12px; }
.recording-indicator .dot { width:8px; height:8px; border-radius:50%; background:var(--red); animation:blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* Modal */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:100; align-items:center; justify-content:center; }
.modal-overlay.show { display:flex; }
.modal { background:var(--surface); border-radius:12px; padding:20px; max-width:400px; width:90%; }
.modal h3 { margin-bottom:12px; }
.modal p { font-size:13px; color:var(--text2); margin-bottom:12px; line-height:1.5; }

/* Sustain indicator */
.sustain-on { position:fixed; bottom:150px; right:8px; background:var(--accent); color:#fff; padding:4px 8px; border-radius:4px; font-size:11px; z-index:5; display:none; }

/* Scrollbar */
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

@media (max-width:768px) {
  .key-white { width:16px; height:110px; }
  .key-black { width:10px; height:70px; }
  #piano { height:110px; }
  .tab { font-size:11px; padding:8px 2px; }
}
</style>
</head>
<body>
<div id="app">
  <div class="status-bar">
    <span id="midi-status">MIDI: 연결 안됨</span>
    <span id="octave-display">옥타브: C4</span>
    <span id="sustain-indicator" style="display:none">🎹 서스테인</span>
  </div>
  <div class="tabs">
    <div class="tab active" data-tab="free">자유연주</div>
    <div class="tab" data-tab="learn">학습</div>
    <div class="tab" data-tab="synth">Synthesia</div>
    <div class="tab" data-tab="record">녹음</div>
  </div>

  <!-- Free Play -->
  <div class="panel active" id="panel-free">
    <div class="free-controls">
      <label>옥타브: <select id="base-octave"><option value="2">2</option><option value="3" selected>3</option><option value="4">4</option><option value="5">5</option></select></label>
      <label>볼륨: <input type="range" id="volume" min="0" max="100" value="70" style="width:80px"></label>
    </div>
    <div style="flex:1"></div>
  </div>

  <!-- Learn -->
  <div class="panel" id="panel-learn">
    <div class="learn-list" id="learn-list"></div>
    <div class="lesson-view" id="lesson-view">
      <div class="lesson-header">
        <button class="btn btn-back" id="btn-back-learn">← 목록</button>
        <h2 id="lesson-title"></h2>
        <span id="lesson-stars"></span>
      </div>
      <div class="lesson-desc" id="lesson-desc"></div>
      <div class="lesson-actions">
        <button class="btn btn-primary" id="btn-demo">데모 보기</button>
        <button class="btn btn-primary" id="btn-practice">연습하기</button>
        <button class="btn btn-primary" id="btn-test">테스트</button>
      </div>
      <div style="flex:1"></div>
    </div>
  </div>

  <!-- Synthesia -->
  <div class="panel" id="panel-synth">
    <div class="synth-controls">
      <label>곡: <select id="song-select"></select></label>
      <label>속도: <input type="range" id="speed" min="50" max="200" value="100" style="width:80px"><span id="speed-val">1.0x</span></label>
      <button class="btn btn-primary" id="btn-play-synth">▶ 재생</button>
      <button class="btn btn-secondary" id="btn-stop-synth">■ 정지</button>
      <label style="font-size:12px"><input type="checkbox" id="auto-play"> 자동연주</label>
    </div>
    <div class="synth-score" id="synth-score" style="display:none">
      <span class="score-perfect">Perfect: <b id="sc-perfect">0</b></span>
      <span class="score-good">Good: <b id="sc-good">0</b></span>
      <span class="score-miss">Miss: <b id="sc-miss">0</b></span>
      <span>점수: <b id="sc-total">0</b></span>
    </div>
    <canvas id="synth-canvas" style="flex:1"></canvas>
  </div>

  <!-- Record -->
  <div class="panel" id="panel-record">
    <div class="rec-controls">
      <button class="btn btn-primary" id="btn-rec-start">⏺ 녹음 시작</button>
      <button class="btn btn-secondary" id="btn-rec-stop" disabled>⏹ 정지</button>
      <span class="recording-indicator" id="rec-indicator" style="display:none"><span class="dot"></span>녹음 중</span>
    </div>
    <div class="rec-list" id="rec-list"></div>
  </div>

  <!-- Piano keyboard -->
  <div id="piano-wrap"><div id="piano"></div></div>
</div>

<div class="modal-overlay" id="result-modal">
  <div class="modal">
    <h3 id="result-title">결과</h3>
    <p id="result-body"></p>
    <button class="btn btn-primary" onclick="document.getElementById('result-modal').classList.remove('show')">확인</button>
  </div>
</div>

<script>
// ===== CONSTANTS =====
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const WHITE_NOTES = ['C','D','E','F','G','A','B'];

// Build all 88 keys: A0 to C8
function buildAllKeys() {
  const keys = [];
  // A0, A#0, B0
  keys.push({note:'A',octave:0,midi:21},{note:'A#',octave:0,midi:22},{note:'B',octave:0,midi:23});
  for (let oct = 1; oct <= 7; oct++) {
    for (let i = 0; i < 12; i++) {
      keys.push({note:NOTE_NAMES[i], octave:oct, midi:12+oct*12+i});
    }
  }
  // C8
  keys.push({note:'C',octave:8,midi:108});
  return keys;
}
const ALL_KEYS = buildAllKeys();
const isBlack = n => n.includes('#');
function midiToFreq(midi) { return 440 * Math.pow(2, (midi - 69) / 12); }
function noteName(k) { return k.note + k.octave; }
function midiToName(midi) { const k = ALL_KEYS.find(k=>k.midi===midi); return k ? noteName(k) : ''; }
function nameToMidi(name) {
  const m = name.match(/^([A-G]#?)(\d)$/);
  if (!m) return -1;
  const k = ALL_KEYS.find(k => k.note === m[1] && k.octave === parseInt(m[2]));
  return k ? k.midi : -1;
}

// ===== AUDIO ENGINE =====
let audioCtx;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

const activeNotes = new Map(); // midi -> {nodes, startTime}
let sustainOn = false;
const sustainedNotes = new Set();

function playNote(midi, velocity = 0.7) {
  const ctx = ensureAudio();
  const freq = midiToFreq(midi);
  const vol = velocity * (parseInt(document.getElementById('volume').value) / 100);
  const now = ctx.currentTime;

  // Create gain for ADSR
  const masterGain = ctx.createGain();
  masterGain.connect(ctx.destination);

  // Harmonics for piano-like timbre
  const harmonics = [
    {ratio:1, gain:1}, {ratio:2, gain:0.5}, {ratio:3, gain:0.2},
    {ratio:4, gain:0.1}, {ratio:5, gain:0.05}, {ratio:6, gain:0.03}
  ];

  const oscs = harmonics.map(h => {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq * h.ratio;
    // Clamp high harmonics
    if (freq * h.ratio > 15000) { g.gain.value = 0; } else { g.gain.value = h.gain * vol; }
    osc.connect(g);
    g.connect(masterGain);
    osc.start(now);
    return {osc, gain:g};
  });

  // ADSR envelope
  const attack = 0.005, decay = 0.3, sustainLevel = 0.3, release = 0.8;
  masterGain.gain.setValueAtTime(0, now);
  masterGain.gain.linearRampToValueAtTime(vol, now + attack);
  masterGain.gain.exponentialRampToValueAtTime(Math.max(vol * sustainLevel, 0.001), now + attack + decay);

  // Stop existing note on same key
  if (activeNotes.has(midi)) {
    stopNoteImmediate(midi);
  }

  activeNotes.set(midi, {oscs, masterGain, startTime: now});

  // Highlight key
  const el = document.querySelector(`[data-midi="${midi}"]`);
  if (el) el.classList.add('pressed');

  // Recording
  if (isRecording) {
    recordBuffer.push({midi, time: Date.now() - recordStart, type:'on'});
  }

  // Lesson/synth hooks
  if (onNoteCallback) onNoteCallback(midi);
}

function stopNote(midi) {
  if (sustainOn) { sustainedNotes.add(midi); return; }
  releaseNote(midi);
}

function releaseNote(midi) {
  const ctx = ensureAudio();
  const data = activeNotes.get(midi);
  if (!data) return;
  const now = ctx.currentTime;
  const release = 0.5;
  data.masterGain.gain.cancelScheduledValues(now);
  data.masterGain.gain.setValueAtTime(data.masterGain.gain.value, now);
  data.masterGain.gain.exponentialRampToValueAtTime(0.001, now + release);
  data.oscs.forEach(o => o.osc.stop(now + release + 0.1));
  activeNotes.delete(midi);

  const el = document.querySelector(`[data-midi="${midi}"]`);
  if (el) el.classList.remove('pressed');

  if (isRecording) {
    recordBuffer.push({midi, time: Date.now() - recordStart, type:'off'});
  }
}

function stopNoteImmediate(midi) {
  const ctx = ensureAudio();
  const data = activeNotes.get(midi);
  if (!data) return;
  data.oscs.forEach(o => { try { o.osc.stop(); } catch(e){} });
  activeNotes.delete(midi);
  const el = document.querySelector(`[data-midi="${midi}"]`);
  if (el) el.classList.remove('pressed');
}

function releaseSustain() {
  sustainedNotes.forEach(midi => releaseNote(midi));
  sustainedNotes.clear();
}

// ===== PIANO KEYBOARD RENDERING =====
function buildPiano() {
  const piano = document.getElementById('piano');
  piano.innerHTML = '';
  const whiteKeys = ALL_KEYS.filter(k => !isBlack(k.note));
  const blackKeys = ALL_KEYS.filter(k => isBlack(k.note));

  const whiteWidth = window.innerWidth < 768 ? 16 : 22;
  const totalWidth = whiteKeys.length * whiteWidth;
  piano.style.width = totalWidth + 'px';

  // White keys
  whiteKeys.forEach((k, i) => {
    const el = document.createElement('div');
    el.className = 'key-white';
    el.dataset.midi = k.midi;
    el.dataset.note = noteName(k);
    el.style.width = whiteWidth + 'px';
    if (k.note === 'C') {
      const lbl = document.createElement('span');
      lbl.className = 'key-label';
      lbl.textContent = 'C' + k.octave;
      el.appendChild(lbl);
    }
    piano.appendChild(el);
  });

  // Black keys positioned over white keys
  const blackWidth = window.innerWidth < 768 ? 10 : 14;
  blackKeys.forEach(k => {
    // Find position: which white key is just before this black key?
    const prevWhite = whiteKeys.filter(w => w.midi < k.midi).length;
    const el = document.createElement('div');
    el.className = 'key-black';
    el.dataset.midi = k.midi;
    el.dataset.note = noteName(k);
    el.style.width = blackWidth + 'px';
    el.style.left = (prevWhite * whiteWidth - blackWidth/2) + 'px';
    piano.appendChild(el);
  });

  // Touch/mouse events
  piano.addEventListener('pointerdown', e => {
    const key = e.target.closest('[data-midi]');
    if (!key) return;
    e.preventDefault();
    playNote(parseInt(key.dataset.midi));
    key.setPointerCapture(e.pointerId);
  });
  piano.addEventListener('pointerup', e => {
    const key = e.target.closest('[data-midi]');
    if (!key) return;
    stopNote(parseInt(key.dataset.midi));
  });
  piano.addEventListener('pointerleave', e => {
    const key = e.target.closest('[data-midi]');
    if (!key) return;
    stopNote(parseInt(key.dataset.midi));
  });
}

// ===== KEYBOARD MAPPING =====
const keyboardMap = {};
function buildKeyMap() {
  const baseOctave = parseInt(document.getElementById('base-octave').value);
  // Lower row: Z-M = C to B (one octave)
  const lower = 'ZXCVBNM';
  const lowerSharps = {'S':'C#','D':'D#','G':'F#','H':'G#','J':'A#'}; // S,D,F,G,H,J mapped to black keys
  const lowerSharpKeys = 'SDGHJ';

  // Upper row: Q-P = next octave
  const upper = 'QWERTYU';
  const upperSharps = {'2':'C#','3':'D#','5':'F#','6':'G#','7':'A#'};

  // Clear
  Object.keys(keyboardMap).forEach(k => delete keyboardMap[k]);

  // Lower octave whites
  const whites = ['C','D','E','F','G','A','B'];
  lower.split('').forEach((k, i) => {
    if (i < whites.length) {
      const midi = nameToMidi(whites[i] + baseOctave);
      if (midi > 0) keyboardMap[k] = midi;
    }
  });
  // Lower octave blacks via S,D,G,H,J
  Object.entries(lowerSharps).forEach(([k, note]) => {
    const midi = nameToMidi(note + baseOctave);
    if (midi > 0) keyboardMap[k] = midi;
  });

  // Upper octave
  const oct2 = baseOctave + 1;
  upper.split('').forEach((k, i) => {
    if (i < whites.length) {
      const midi = nameToMidi(whites[i] + oct2);
      if (midi > 0) keyboardMap[k] = midi;
    }
  });
  Object.entries(upperSharps).forEach(([k, note]) => {
    const midi = nameToMidi(note + oct2);
    if (midi > 0) keyboardMap[k] = midi;
  });
}

const heldKeys = new Set();
document.addEventListener('keydown', e => {
  if (e.repeat) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;

  if (e.code === 'Space') {
    e.preventDefault();
    sustainOn = true;
    document.getElementById('sustain-indicator').style.display = 'inline';
    return;
  }

  const k = e.key.toUpperCase();
  if (keyboardMap[k] && !heldKeys.has(k)) {
    heldKeys.add(k);
    playNote(keyboardMap[k]);
  }
});
document.addEventListener('keyup', e => {
  if (e.code === 'Space') {
    sustainOn = false;
    document.getElementById('sustain-indicator').style.display = 'none';
    releaseSustain();
    return;
  }
  const k = e.key.toUpperCase();
  if (keyboardMap[k]) {
    heldKeys.delete(k);
    stopNote(keyboardMap[k]);
  }
});

document.getElementById('base-octave').addEventListener('change', () => {
  buildKeyMap();
  document.getElementById('octave-display').textContent = '옥타브: C' + document.getElementById('base-octave').value;
});

// ===== MIDI =====
function initMIDI() {
  if (!navigator.requestMIDIAccess) return;
  navigator.requestMIDIAccess().then(access => {
    function onMIDIMessage(e) {
      const [status, note, vel] = e.data;
      const cmd = status & 0xf0;
      if (cmd === 0x90 && vel > 0) playNote(note, vel / 127);
      else if (cmd === 0x80 || (cmd === 0x90 && vel === 0)) stopNote(note);
      else if (cmd === 0xb0 && note === 64) {
        if (vel >= 64) { sustainOn = true; document.getElementById('sustain-indicator').style.display = 'inline'; }
        else { sustainOn = false; document.getElementById('sustain-indicator').style.display = 'none'; releaseSustain(); }
      }
    }
    function connectInputs() {
      const inputs = Array.from(access.inputs.values());
      if (inputs.length > 0) {
        document.getElementById('midi-status').textContent = 'MIDI: ' + inputs[0].name;
        document.getElementById('midi-status').style.color = 'var(--green)';
      } else {
        document.getElementById('midi-status').textContent = 'MIDI: 연결 안됨';

}

});

// ===== PROGRESS =====
let progress = JSON.parse(localStorage.getItem('piano-progress') || '{}');
function saveProgress() { localStorage.setItem('piano-progress', JSON.stringify(progress)); }
function getLessonStars(id) { return progress[id] || 0; }
function setLessonStars(id, stars) { progress[id] = Math.max(progress[id]||0, stars); saveProgress(); }

// ===== LEARN PANEL =====
function renderLearnList() {
  const el = document.getElementById('learn-list');
  el.style.display = '';
  document.getElementById('lesson-view').classList.remove('active');

  let html = '<div class="learn-section"><h3>바이엘 기초 (20 레슨)</h3>';
  LESSONS.bayer.forEach(l => {
    const stars = getLessonStars(l.id);
    const starStr = stars > 0 ? '★'.repeat(stars) + '☆'.repeat(3-stars) : '';
    html += `<div class="lesson-item" data-lesson="${l.id}"><span>${l.name}</span><span>${starStr ? '<span class="stars">'+starStr+'</span>' : '<span class="status new">NEW</span>'}</span></div>`;
  });
  html += '</div><div class="learn-section"><h3>체르니 100 (10 연습곡)</h3>';
  LESSONS.czerny.forEach(l => {
    const stars = getLessonStars(l.id);
    const starStr = stars > 0 ? '★'.repeat(stars) + '☆'.repeat(3-stars) : '';
    html += `<div class="lesson-item" data-lesson="${l.id}"><span>${l.name}</span><span>${starStr ? '<span class="stars">'+starStr+'</span>' : '<span class="status new">NEW</span>'}</span></div>`;
  });
  html += '</div>';
  el.innerHTML = html;

  el.querySelectorAll('.lesson-item').forEach(item => {

  });
}

function findLesson(id) {
  return [...LESSONS.bayer, ...LESSONS.czerny].find(l => l.id === id);
}

function openLesson(id) {
  const lesson = findLesson(id);
  if (!lesson) return;
  document.getElementById('learn-list').style.display = 'none';
  document.getElementById('lesson-view').classList.add('active');
  document.getElementById('lesson-title').textContent = lesson.name;
  const stars = getLessonStars(id);
  document.getElementById('lesson-stars').innerHTML = stars > 0 ? '<span style="color:var(--yellow)">' + '★'.repeat(stars) + '☆'.repeat(3-stars) + '</span>' : '';
  document.getElementById('lesson-desc').textContent = lesson.desc;

  document.getElementById('btn-demo').onclick = () => startSynthesia(lesson.notes, 100, true, null);
  document.getElementById('btn-practice').onclick = () => startSynthesia(lesson.notes, 80, false, null);
  document.getElementById('btn-test').onclick = () => startSynthesia(lesson.notes, 100, false, id);
}

document.getElementById('btn-back-learn').addEventListener('click', () => {
  stopSynthesia();
  renderLearnList();
});

// ===== SYNTHESIA ENGINE =====
let synthCanvas, synthCtx;
let synthRunning = false, synthAnimId = null;
let synthNotes = [], synthBPM = 120, synthSpeed = 1, synthAutoPlay = false;
let synthStartTime = 0, synthTestId = null;
let synthScore = {perfect:0, good:0, miss:0};
let onNoteCallback = null;
let notesHit = new Set();

function resizeSynthCanvas() {
  const canvas = document.getElementById('synth-canvas');
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * window.devicePixelRatio;
  canvas.height = rect.height * window.devicePixelRatio;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
}

function getKeyX(noteName) {
  const midi = nameToMidi(noteName);
  const el = document.querySelector(`[data-midi="${midi}"]`);
  if (!el) return null;
  const pianoWrap = document.getElementById('piano-wrap');
  const pianoRect = pianoWrap.getBoundingClientRect();
  const keyRect = el.getBoundingClientRect();
  return {
    x: keyRect.left - pianoRect.left + pianoWrap.scrollLeft,
    width: keyRect.width,
    isBlack: el.classList.contains('key-black')
  };
}

function startSynthesia(notes, bpm, autoPlay, testId) {
  // Switch to synth tab if needed
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector('[data-tab="synth"]').classList.add('active');
  document.getElementById('panel-synth').classList.add('active');

  stopSynthesia();
  resizeSynthCanvas();

  synthNotes = notes.map((n, i) => ({...n, idx: i, played: false, result: null}));
  synthBPM = bpm;
  synthSpeed = parseInt(document.getElementById('speed').value) / 100;
  synthAutoPlay = autoPlay;
  synthTestId = testId;
  synthScore = {perfect:0, good:0, miss:0};
  notesHit = new Set();

  document.getElementById('sc-perfect').textContent = '0';
  document.getElementById('sc-good').textContent = '0';
  document.getElementById('sc-miss').textContent = '0';
  document.getElementById('sc-total').textContent = '0';
  document.getElementById('synth-score').style.display = autoPlay ? 'none' : 'flex';

  synthStartTime = performance.now();
  synthRunning = true;

  // Note callback for play-along
  if (!autoPlay) {
    onNoteCallback = (midi) => {
      const name = midiToName(midi);
      const now = (performance.now() - synthStartTime) / 1000;
      const beatToSec = 60 / (synthBPM * synthSpeed);

      // Find closest unplayed note matching this key
      let best = null, bestDiff = Infinity;
      synthNotes.forEach(n => {
        if (n.played || n.note !== name) return;
        const noteTime = n.time * beatToSec;
        const diff = Math.abs(now - noteTime);
        if (diff < bestDiff && diff < 2) { bestDiff = diff; best = n; }
      });

      if (best) {
        best.played = true;
        if (bestDiff < 0.15) { best.result = 'perfect'; synthScore.perfect++; }
        else if (bestDiff < 0.4) { best.result = 'good'; synthScore.good++; }
        else { best.result = 'miss'; synthScore.miss++; }

        // Flash key
        const el = document.querySelector(`[data-midi="${midi}"]`);
        if (el) {
          el.classList.add('hit-' + best.result);
          setTimeout(() => el.classList.remove('hit-perfect','hit-good','hit-miss'), 300);
        }

        document.getElementById('sc-perfect').textContent = synthScore.perfect;
        document.getElementById('sc-good').textContent = synthScore.good;
        document.getElementById('sc-miss').textContent = synthScore.miss;
        document.getElementById('sc-total').textContent = synthScore.perfect * 100 + synthScore.good * 50;
      }
    };
  }

  synthAnimId = requestAnimationFrame(synthLoop);
}

function synthLoop(timestamp) {
  if (!synthRunning) return;
  const canvas = document.getElementById('synth-canvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;
  const dpr = window.devicePixelRatio;

  ctx.clearRect(0, 0, W, H);

  const now = (performance.now() - synthStartTime) / 1000;
  const beatToSec = 60 / (synthBPM * synthSpeed);
  const pixelsPerSec = (H * 0.6); // how fast notes fall
  const pianoWrap = document.getElementById('piano-wrap');
  const scrollLeft = pianoWrap.scrollLeft;
  const pianoWidth = pianoWrap.scrollWidth;

  // Scale factor for canvas vs piano width
  const canvasToKeyScale = W / pianoWrap.clientWidth;

  let allDone = true;

  synthNotes.forEach(n => {
    const noteTimeSec = n.time * beatToSec;
    const noteDurSec = n.duration * beatToSec;
    const keyInfo = getKeyX(n.note);
    if (!keyInfo) return;

    // Calculate Y position (bottom = keyboard, notes fall down)
    const noteBottom = H - (noteTimeSec - now) * pixelsPerSec * dpr;
    const noteTop = noteBottom - noteDurSec * pixelsPerSec * dpr;
    const noteHeight = Math.max(noteDurSec * pixelsPerSec * dpr, 6 * dpr);

    // Check if note is still visible or in future
    if (noteTop > H + 50 * dpr) {
      // Passed below screen - mark as miss if not played
      if (!n.played && !synthAutoPlay) {
        n.played = true;
        n.result = 'miss';
        synthScore.miss++;
        document.getElementById('sc-miss').textContent = synthScore.miss;
      }
      return;
    }
    if (noteBottom < -200 * dpr) { allDone = false; return; } // not yet visible

    allDone = false;

    // X position
    const keyX = (keyInfo.x - scrollLeft) * canvasToKeyScale * dpr;
    const keyW = keyInfo.width * canvasToKeyScale * dpr;

    // Colors
    let color;
    if (n.result === 'perfect') color = 'rgba(34,197,94,0.7)';
    else if (n.result === 'good') color = 'rgba(234,179,8,0.7)';
    else if (n.result === 'miss') color = 'rgba(239,68,68,0.5)';
    else if (n.hand === 'L') color = 'rgba(59,130,246,0.8)';
    else color = 'rgba(34,197,94,0.8)';

    // Draw note block
    const drawY = Math.min(noteTop, noteBottom - noteHeight);
    ctx.fillStyle = color;
    ctx.beginPath();
    const r = 4 * dpr;
    const x = keyX, y = drawY, w = keyW, h = noteHeight;
    ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
    ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
    ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
    ctx.fill();

    // Note name on block
    ctx.fillStyle = '#fff';
    ctx.font = `${10*dpr}px sans-serif`;
    ctx.textAlign = 'center';
    if (noteHeight > 14 * dpr) {
      ctx.fillText(n.note, keyX + keyW/2, drawY + noteHeight/2 + 4*dpr);
    }

    // Auto-play: trigger when note reaches bottom
    if (synthAutoPlay && !n.played && noteBottom >= H - 10 * dpr) {
      n.played = true;
      const midi = nameToMidi(n.note);
      if (midi > 0) {
        playNote(midi, 0.7);
        setTimeout(() => stopNote(midi), noteDurSec * 1000);
        // Highlight key with hand color
        const el = document.querySelector(`[data-midi="${midi}"]`);
        if (el) {
          el.classList.add(n.hand === 'L' ? 'left-hand' : 'right-hand');
          setTimeout(() => el.classList.remove('left-hand','right-hand'), noteDurSec * 1000);
        }
      }
    }

    // When note reaches keyboard line, highlight
    if (!synthAutoPlay && !n.played && Math.abs(noteBottom - H) < 30 * dpr) {
      const el = document.querySelector(`[data-midi="${nameToMidi(n.note)}"]`);
      if (el) {
        el.classList.add(n.hand === 'L' ? 'left-hand' : 'right-hand');
        setTimeout(() => el.classList.remove('left-hand','right-hand'), 200);
      }
    }
  });

  // Draw hit line at bottom
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 2 * dpr;
  ctx.beginPath();
  ctx.moveTo(0, H - 2*dpr);
  ctx.lineTo(W, H - 2*dpr);
  ctx.stroke();

  if (allDone && now > 2) {
    synthRunning = false;
    onNoteCallback = null;
    // Show result
    if (synthTestId) {
      const total = synthNotes.length;
      const pct = (synthScore.perfect + synthScore.good * 0.5) / total;
      let stars = 0;
      if (pct >= 0.9) stars = 3;
      else if (pct >= 0.7) stars = 2;
      else if (pct >= 0.4) stars = 1;
      setLessonStars(synthTestId, stars);

      document.getElementById('result-title').textContent = '테스트 결과';
      document.getElementById('result-body').innerHTML =
        `Perfect: ${synthScore.perfect} / Good: ${synthScore.good} / Miss: ${synthScore.miss}<br>` +
        `점수: ${synthScore.perfect * 100 + synthScore.good * 50}<br>` +
        `${'★'.repeat(stars)}${'☆'.repeat(3-stars)}`;
      document.getElementById('result-modal').classList.add('show');
    }
    return;
  }

  synthAnimId = requestAnimationFrame(synthLoop);
}

function stopSynthesia() {
  synthRunning = false;
  if (synthAnimId) cancelAnimationFrame(synthAnimId);
  onNoteCallback = null;
  // Clear canvas
  const canvas = document.getElementById('synth-canvas');
  if (canvas) {
    const ctx = canvas.getContext('2d');
    if (ctx) ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  // Clear key highlights
  document.querySelectorAll('.left-hand,.right-hand,.hit-perfect,.hit-good,.hit-miss').forEach(el => {
    el.classList.remove('left-hand','right-hand','hit-perfect','hit-good','hit-miss');
  });
}

// ===== RECORDING =====
let isRecording = false, recordStart = 0, recordBuffer = [];
let recordings = JSON.parse(localStorage.getItem('piano-recordings') || '[]');

function renderRecordings() {
  const el = document.getElementById('rec-list');
  if (recordings.length === 0) {
    el.innerHTML = '<p style="color:var(--text2);padding:20px;text-align:center">녹음된 파일이 없습니다.<br>녹음 시작 버튼을 눌러 연주를 녹음하세요.</p>';
    return;
  }
  el.innerHTML = recordings.map((r, i) => `
    <div class="rec-item">
      <span>${r.name} (${(r.duration/1000).toFixed(1)}초, ${r.noteCount}음)</span>
      <div class="rec-item-actions">
        <button class="btn btn-primary" onclick="playRecording(${i})">▶</button>
        <button class="btn btn-secondary" onclick="shareRecording(${i})">📋</button>
        <button class="btn btn-secondary" onclick="deleteRecording(${i})" style="color:var(--red)">✕</button>
      </div>
    </div>
  `).join('');
}

document.getElementById('btn-rec-start').addEventListener('click', () => {
  isRecording = true;
  recordStart = Date.now();
  recordBuffer = [];
  document.getElementById('btn-rec-start').disabled = true;
  document.getElementById('btn-rec-stop').disabled = false;
  document.getElementById('rec-indicator').style.display = 'inline-flex';
});

document.getElementById('btn-rec-stop').addEventListener('click', () => {
  isRecording = false;
  document.getElementById('btn-rec-start').disabled = false;
  document.getElementById('btn-rec-stop').disabled = true;
  document.getElementById('rec-indicator').style.display = 'none';

  if (recordBuffer.length > 0) {
    const duration = Date.now() - recordStart;
    const noteCount = recordBuffer.filter(e => e.type === 'on').length;
    const name = `녹음 ${recordings.length + 1} (${new Date().toLocaleTimeString('ko-KR')})`;
    recordings.push({name, duration, noteCount, events: recordBuffer});
    localStorage.setItem('piano-recordings', JSON.stringify(recordings));
    renderRecordings();
  }
});

window.playRecording = function(idx) {
  const rec = recordings[idx];
  if (!rec) return;
  rec.events.forEach(ev => {
    setTimeout(() => {
      if (ev.type === 'on') playNote(ev.midi, 0.7);
      else stopNote(ev.midi);
    }, ev.time);
  });
};

window.shareRecording = function(idx) {
  const rec = recordings[idx];
  if (!rec) return;
  const data = btoa(JSON.stringify(rec));
  navigator.clipboard.writeText(data).then(() => {
    alert('녹음 데이터가 클립보드에 복사되었습니다!');
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = data;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    alert('녹음 데이터가 클립보드에 복사되었습니다!');
  });
};

window.deleteRecording = function(idx) {
  recordings.splice(idx, 1);
  localStorage.setItem('piano-recordings', JSON.stringify(recordings));
  renderRecordings();
};

// ===== INIT =====
function init() {
  buildPiano();
  buildKeyMap();
  initMIDI();
  renderLearnList();
  renderRecordings();
  resizeSynthCanvas();

  // Scroll piano to middle C area
  const pianoWrap = document.getElementById('piano-wrap');
  const c4Key = document.querySelector('[data-note="C4"]');
  if (c4Key && pianoWrap) {
    const keyRect = c4Key.getBoundingClientRect();
    const wrapRect = pianoWrap.getBoundingClientRect();
    pianoWrap.scrollLeft = c4Key.offsetLeft - wrapRect.width / 2 + keyRect.width / 2;
  }
}

window.addEventListener('resize', () => {
  buildPiano();
  resizeSynthCanvas();
});

window.addEventListener('load', init);
</script>
