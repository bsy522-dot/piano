  {id:"electric", label:"일렉트릭 피아노", osc:"fmsine", mod:"square", modIdx:8, harm:2.5, atk:0.002, dec:0.8, sus:0.25, rel:1.2, vol:-8},
  {id:"musicbox", label:"오르골", osc:"triangle", mod:"sine", modIdx:0, harm:1, atk:0.002, dec:0.6, sus:0.05, rel:0.8, vol:-4},
  {id:"organ", label:"오르간", osc:"fatsine", mod:"sine", modIdx:0, harm:1, atk:0.05, dec:0.1, sus:0.8, rel:0.3, vol:-10},
  {id:"bells", label:"벨", osc:"amsine", mod:"sine", modIdx:0, harm:3, atk:0.001, dec:1.8, sus:0.02, rel:2.5, vol:-8},
];

const nClr = m => {
  const colors = ["#ff6b6b","#ff8e53","#feca57","#48dbfb","#0abde3","#1dd1a1","#55efc4","#a29bfe","#6c5ce7","#fd79a8","#e84393","#f8a5c2"];
  return colors[m % 12];
};
const JW = {perfect:.12,great:.22,good:.38};
const JC = {perfect:"#00f5d4",great:"#fee440",good:"#a78bfa",miss:"#f43f5e"};
const JT = {perfect:"PERFECT",great:"GREAT",good:"GOOD",miss:"MISS"};

function App() {
  const [view, setView] = useState("menu");
  const [sid, setSid] = useState(null);
  const [zoom, setZoom] = useState(1);
  const [pressed, setPressed] = useState({});
  const [playing, setPlaying] = useState(false);
  const [paused, setPaused] = useState(false);
  const [cd, setCd] = useState(null);
  const [score, setScore] = useState(0);
  const [combo, setCombo] = useState(0);
  const [maxCombo, setMC] = useState(0);
  const [judges, setJudges] = useState({perfect:0,great:0,good:0,miss:0});
  const [ja, setJA] = useState(null);
  const [showStart, setSS] = useState(true);
  const [gt, setGt] = useState(-LEAD);
  const [cat, setCat] = useState("all");
  const [speed, setSpeed] = useState(1);
  const [instrument, setInstrument] = useState("grand");
  const [volume, setVolume] = useState(0.8);
  const [showNames, setShowNames] = useState(true);
  const [showSettings, setShowSettings] = useState(false);
  const [showQwerty, setShowQwerty] = useState(true);
  const [demoMode, setDemoMode] = useState(false);
  const [particles, setParticles] = useState([]);
  const particleIdRef = useRef(0);
  const [autoStart, setAutoStart] = useState(null);

  const pianoRef = useRef(null);
  const toneStarted = useRef(false);
  const t0 = useRef(0);
  const raf = useRef(0);
  const scR = useRef(0), cbR = useRef(0), mcR = useRef(0);
  const jdR = useRef({perfect:0,great:0,good:0,miss:0});
  const hnR = useRef(new Set());
  const ptrs = useRef(new Map());
  const cdRef = useRef(null);
  const scrollRef = useRef(null);
  const pinchRef = useRef({dist:0,zoom:1});
  const playR = useRef(false);
  const pauseR = useRef(false);
  const pauseStartR = useRef(0);
  const pauseOffsetR = useRef(0);
  const gtR = useRef(-LEAD);
  const speedR = useRef(1);
  const demoR = useRef(false);
  const demoSetR = useRef(new Set());
  const burstR = useRef([]);

  // Tone.js 멀티레이어 피아노 — 기본음 + 고조파 + 해머 스트라이크 + 바디 공명
  const harmRef = useRef(null);
  const strikeRef = useRef(null);
  const chainRef = useRef(null);
  const pianoVol = useRef(null);
  const instRef = useRef("grand");
  const volRef = useRef(0.8);

  const buildPiano = useCallback((instId) => {
    const inst = INSTRUMENTS.find(i=>i.id===instId) || INSTRUMENTS[0];
    // Clean up existing
    [pianoRef, harmRef, strikeRef].forEach(r => {
      if(r.current){ try{ r.current.dispose(); }catch(e){} r.current = null; }
    });

    // Main voice — rich ADSR
    pianoRef.current = new Tone.PolySynth(Tone.Synth, {
      maxPolyphony: 24,
      voice: Tone.Synth,
      options: {
        oscillator: { type: inst.osc, modulationType: inst.mod, modulationIndex: inst.modIdx, harmonicity: inst.harm },
        envelope: { attack: inst.atk, decay: inst.dec, sustain: inst.sus, release: inst.rel },
        volume: inst.vol,
      }
    });

    // Harmonic layer — 2nd harmonic for body
    if(instId === "grand" || instId === "electric"){
      harmRef.current = new Tone.PolySynth(Tone.Synth, {
        maxPolyphony: 24, voice: Tone.Synth,
        options: {
          oscillator: { type: "sine" },
          envelope: { attack: 0.02, decay: 0.8, sustain: 0.1, release: 1.2 },
          volume: -18,
        }
      });
    }

    // Strike transient — noise burst
    if(instId === "grand"){
      strikeRef.current = new Tone.NoiseSynth({
        noise: { type: "pink" },
        envelope: { attack: 0.001, decay: 0.03, sustain: 0, release: 0.01 },
        volume: -32,
      });
    }

    // Connect all to chain
    [pianoRef, harmRef, strikeRef].forEach(r => {
      if(r.current && chainRef.current) r.current.connect(chainRef.current);
    });
  }, []);

  const initPiano = useCallback(async () => {
    if (toneStarted.current) return;
    if(!window.Tone){ console.warn("Tone.js not loaded"); return; }
    try { await Tone.start(); } catch(e){}
    toneStarted.current = true;

    // Effect chain: compressor → reverb → master volume
    const reverb = new Tone.Reverb({ decay: 2.2, wet: 0.22, preDelay: 0.02 });
    const comp = new Tone.Compressor({ threshold: -18, ratio: 3, attack: 0.003, release: 0.1 });
    pianoVol.current = new Tone.Volume(Tone.gainToDb(volRef.current));
    comp.chain(reverb, pianoVol.current, Tone.getDestination());
    chainRef.current = comp;

    buildPiano(instRef.current);
  }, [buildPiano]);

  const playSound = useCallback(async (midi, velocity = 0.85) => {
    try {
      if (!toneStarted.current) await initPiano();
      if (!pianoRef.current) return;
      const { note, oct } = m2n(midi);
      const noteName = `${note}${oct}`;
      const now = Tone.now();
      const v = Math.max(0.15, Math.min(1, velocity));
      pianoRef.current.triggerAttackRelease(noteName, "8n", now, v);
      // Sub-harmonic for richer body (octave below, quieter)
      if (harmRef.current && oct > 1) {
        const harmName = `${note}${oct - 1}`;
        harmRef.current.triggerAttackRelease(harmName, "8n", now, v * 0.5);
      }
      // Hammer strike noise
      if (strikeRef.current) strikeRef.current.triggerAttackRelease("32n", now, v * 0.4);
    } catch(e) {}
  }, [initPiano]);

  const startMidi=36, endMidi=96;
  const keys=useMemo(()=>{const a=[];for(let m=startMidi;m<=endMidi;m++)a.push({midi:m,...m2n(m),black:isBk(m)});return a;},[]);
  const whites=useMemo(()=>keys.filter(k=>!k.black),[keys]);
  const blacks=useMemo(()=>keys.filter(k=>k.black),[keys]);

  const kw=42*zoom, bkw=26*zoom, kh=150*zoom, bkh=95*zoom;
  const totalW=whites.length*kw;
  const PPS = 150; // pixels per second — 줌과 무관하게 고정

  const getKeyX=useCallback((midi)=>{
    const{note,oct}=m2n(midi),ni=NN.indexOf(note),oo=oct-m2n(startMidi).oct;
    if(isBk(midi))return(oo*7+BKO[ni])*kw+(kw-bkw)/2;
    return(oo*7+WI.indexOf(ni))*kw;
  },[kw,bkw]);

  // Particle burst on key hit
  const spawnBurst = useCallback((midi, color) => {
    const id = ++particleIdRef.current;
    const parts = [];
    for(let i=0; i<6; i++){
      parts.push({
        id: id*100 + i,
        midi,
        color,
        dx: (Math.random()-0.5)*60,
        dy: -30 - Math.random()*40,
      });
    }
    setParticles(p => [...p, ...parts]);
    setTimeout(()=>{
      setParticles(p => p.filter(x => !parts.find(q=>q.id===x.id)));
    }, 600);
  }, []);

  const hitKey=useCallback((midi, isDemo=false)=>{
    setPressed(p=>({...p,[midi]:Date.now()}));
    // Velocity: slightly higher for demo, varied for user
    const vel = isDemo ? 0.78 : (0.72 + Math.random()*0.2);
    playSound(midi, vel);
    if(playR.current && sid && !isDemo && !pauseR.current){
      const song=SONGS.find(s=>s.id===sid),ct=gtR.current;
      let bd=Infinity,bi=-1;
      song.notes.forEach((n,i)=>{if(hnR.current.has(i)||n.m!==midi)return;const d=Math.abs(ct-n.t);if(d<bd){bd=d;bi=i;}});
      if(bi>=0&&bd<=JW.good){
        let j,pt;
        if(bd<=JW.perfect){j="perfect";pt=100;}else if(bd<=JW.great){j="great";pt=70;}else{j="good";pt=40;}
        hnR.current.add(bi);cbR.current++;if(cbR.current>mcR.current)mcR.current=cbR.current;
        scR.current+=pt+Math.floor(cbR.current/10)*10;
        jdR.current={...jdR.current,[j]:jdR.current[j]+1};
        setScore(scR.current);setCombo(cbR.current);setMC(mcR.current);
        setJudges({...jdR.current});setJA({type:j,key:Date.now()});
        if(j==="perfect"||j==="great") spawnBurst(midi, nClr(midi));
      }
    } else {
      // Free play or demo — visual burst
      spawnBurst(midi, nClr(midi));
    }
    // Auto-release for demo (no pointer up)
    if(isDemo){
      setTimeout(()=>setPressed(p=>{const n={...p};delete n[midi];return n;}), 180);
    }
  },[sid,playSound,spawnBurst]);

  const releaseKey=useCallback(midi=>{setPressed(p=>{const n={...p};delete n[midi];return n});},[]);
  const onPD=useCallback(e=>{e.preventDefault();const m=+e.currentTarget.dataset.midi;if(!isNaN(m)){ptrs.current.set(e.pointerId,m);hitKey(m);}},[hitKey]);
  const onPU=useCallback(e=>{const m=ptrs.current.get(e.pointerId);if(m!==undefined){ptrs.current.delete(e.pointerId);releaseKey(m);}},[releaseKey]);

  // 핀치 줌
  const onTS=useCallback(e=>{
    if(e.touches.length===2){
      const dx=e.touches[0].clientX-e.touches[1].clientX;
      const dy=e.touches[0].clientY-e.touches[1].clientY;
      pinchRef.current={dist:Math.hypot(dx,dy),zoom};
    }
  },[zoom]);
  const onTM=useCallback(e=>{
    if(e.touches.length===2){
      e.preventDefault();
      const dx=e.touches[0].clientX-e.touches[1].clientX;
      const dy=e.touches[0].clientY-e.touches[1].clientY;
      const r=Math.hypot(dx,dy)/(pinchRef.current.dist||1);
      setZoom(Math.max(.4,Math.min(2.5,Math.round(pinchRef.current.zoom*r*100)/100)));
    }
  },[]);

  const startSong=useCallback((isDemo=false)=>{
    scR.current=0;cbR.current=0;mcR.current=0;
    jdR.current={perfect:0,great:0,good:0,miss:0};hnR.current=new Set();
    demoSetR.current=new Set();
    setScore(0);setCombo(0);setMC(0);setJudges({perfect:0,great:0,good:0,miss:0});
    setJA(null);setSS(false);gtR.current=-LEAD;setGt(-LEAD);
    setPaused(false);pauseR.current=false;pauseOffsetR.current=0;
    demoR.current=isDemo;setDemoMode(isDemo);

    setCd(3);let c=3;
    cdRef.current=setInterval(()=>{
      c--;if(c>0){setCd(c);}
      else{
        clearInterval(cdRef.current);setCd(null);
        setPlaying(true);playR.current=true;
        t0.current=performance.now();
        const song=SONGS.find(s=>s.id===sid);
        const songEnd=song.notes[song.notes.length-1].t+song.notes[song.notes.length-1].d+2;
        const tick=()=>{
          if(pauseR.current){ raf.current=requestAnimationFrame(tick); return; }
          const ct=((performance.now()-t0.current-pauseOffsetR.current)/1000)*speedR.current-LEAD;
          gtR.current=ct;setGt(ct);
          song.notes.forEach((n,i)=>{
            if(hnR.current.has(i)||demoSetR.current.has(i))return;
            // Demo auto-play at note time
            if(demoR.current && ct>=n.t && ct<n.t+0.05){
              demoSetR.current.add(i);
              hitKey(n.m, true);
              return;
            }
            if(!demoR.current && ct>n.t+.55){
              hnR.current.add(i);cbR.current=0;
              jdR.current={...jdR.current,miss:jdR.current.miss+1};
              setCombo(0);setJudges({...jdR.current});setJA({type:"miss",key:Date.now()});
            }
          });
          if(ct<songEnd)raf.current=requestAnimationFrame(tick);
          else{
            setPlaying(false);playR.current=false;
            if(demoR.current){ demoR.current=false; setDemoMode(false); setSS(true); }
            else setView("result");
          }
        };
        raf.current=requestAnimationFrame(tick);
      }
    },800);
  },[sid, hitKey]);

  const pauseGame = useCallback(()=>{
    if(!playR.current) return;
    if(pauseR.current){
      // Resume
      pauseOffsetR.current += performance.now() - pauseStartR.current;
      pauseR.current = false;
      setPaused(false);
    } else {
      pauseStartR.current = performance.now();
      pauseR.current = true;
      setPaused(true);
    }
  }, []);

  const stopGame=useCallback(()=>{
    setPlaying(false);playR.current=false;setCd(null);setSS(true);
    setPaused(false);pauseR.current=false;
    demoR.current=false;setDemoMode(false);
    if(raf.current)cancelAnimationFrame(raf.current);
    if(cdRef.current)clearInterval(cdRef.current);
  },[]);

  useEffect(()=>()=>stopGame(),[stopGame]);
  useEffect(()=>{
    if(view==="play"){
      initPiano(); // Tone.js 초기화
      if(scrollRef.current){
        const t=sid?SONGS.find(s=>s.id===sid)?.notes[0]?.m||60:60;
        scrollRef.current.scrollLeft=Math.max(0,getKeyX(t)-scrollRef.current.clientWidth/2);
      }
    }
  },[view,zoom,sid,getKeyX,initPiano]);

  // Auto-start (e.g. Demo from menu) — triggers after sid/view sync
  useEffect(()=>{
    if(view==="play" && sid && autoStart){
      const mode = autoStart;
      setAutoStart(null);
      // Delay one tick so scroll/mount settles
      const tid = setTimeout(()=>startSong(mode==="demo"), 180);
      return ()=>clearTimeout(tid);
    }
  }, [view, sid, autoStart, startSong]);

  // Sync speed/volume/instrument refs
  useEffect(()=>{ speedR.current = speed; }, [speed]);
  useEffect(()=>{ volRef.current = volume; if(pianoVol.current){ try{ pianoVol.current.volume.value = Tone.gainToDb(Math.max(0.0001, volume)); }catch(e){} } }, [volume]);
  useEffect(()=>{
    instRef.current = instrument;
    if(toneStarted.current) buildPiano(instrument);
  }, [instrument, buildPiano]);

  // QWERTY keyboard mapping — two rows covering C4 octave + partial C5
  // Z X C V B N M , . / — white keys C4..C5
  // S D G H J L ; — black keys
  const QKEY = useMemo(()=>({
    "z":60,"s":61,"x":62,"d":63,"c":64,"v":65,"g":66,"b":67,"h":68,"n":69,"j":70,"m":71,
    ",":72,"l":73,".":74,";":75,"/":76,
    // Upper row C5+
    "q":72,"2":73,"w":74,"3":75,"e":76,"r":77,"5":78,"t":79,"6":80,"y":81,"7":82,"u":83,
    "i":84,"9":85,"o":86,"0":87,"p":88,
    // Lower octave C3
    "Z":48,"X":50,"C":52,"V":53,"B":55,"N":57,"M":59,
  }), []);

  useEffect(()=>{
    if(!showQwerty) return;
    const held = new Set();
    const kd = (e)=>{
      if(e.repeat || e.ctrlKey || e.metaKey || e.altKey) return;
      if(e.key === " " && view==="play"){ e.preventDefault(); pauseGame(); return; }
      if(e.key === "Escape" && view==="play"){ stopGame(); setView("menu"); return; }
      const k = e.key;
      const midi = QKEY[k] ?? QKEY[k.toLowerCase()];
      if(midi !== undefined && !held.has(midi)){
        held.add(midi);
        hitKey(midi);
      }
    };
    const ku = (e)=>{
      const k = e.key;
      const midi = QKEY[k] ?? QKEY[k.toLowerCase()];
      if(midi !== undefined){
        held.delete(midi);
        setPressed(p=>{const n={...p};delete n[midi];return n});
      }
    };
    window.addEventListener("keydown", kd);
    window.addEventListener("keyup", ku);
    return ()=>{
      window.removeEventListener("keydown", kd);
      window.removeEventListener("keyup", ku);
    };
  }, [showQwerty, view, QKEY, hitKey, pauseGame, stopGame]);

  const isActive = playing || cd!==null;

  /* ══ MENU ══ */
  if(view==="menu") return(
    <div style={{minHeight:"100dvh",background:"linear-gradient(170deg,#06061a,#10082a 50%,#081420)",color:"#fff",fontFamily:"'Noto Sans KR',sans-serif",overflowY:"auto"}}>
      <style>{CSS}</style>
      <header style={{textAlign:"center",padding:"max(32px,env(safe-area-inset-top)) 20px 8px",position:"relative"}}>
        <button onClick={()=>setShowSettings(true)} aria-label="설정" style={{position:"absolute",right:16,top:"max(34px,calc(env(safe-area-inset-top) + 4px))",background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.08)",color:"#ccc",borderRadius:10,width:36,height:36,fontSize:16,cursor:"pointer",fontFamily:"inherit"}}>⚙</button>
        <div style={{fontSize:42}}>🎹</div>
        <h1 style={{fontFamily:"&#39;Playfair Display&#39;,serif",fontSize:"clamp(28px,7vw,44px)",fontWeight:900,background:"linear-gradient(135deg,#00f5d4,#7b61ff,#f43f5e)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",margin:0}}>Piano Master</h1>
        <p style={{color:"#555",fontSize:12,marginTop:6}}>{SONGS.length}곡 수록 · 5가지 악기 · 자유 연주 지원</p>
      </header>
      <div style={{padding:"8px 14px 40px",maxWidth:480,margin:"0 auto"}}>
        {/* Category tabs */}
        <div style={{display:"flex",gap:6,marginBottom:12,overflowX:"auto",paddingBottom:4}}>
          {CATS.map(c=>(
            <button key={c.id} className={"chip" + (cat===c.id?" active":"")} onClick={()=>setCat(c.id)}>{c.label}</button>
          ))}
        </div>
        {SONGS.filter(s=>cat==="all"||s.cat===cat).map((s,i)=>(
          <div key={s.id} className="card" style={{animationDelay:`${i*.05}s`,gap:10,cursor:"pointer"}}
            onClick={()=>{setSid(s.id);setSS(true);setView("play")}}>
            <div style={{width:42,height:42,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0,background:`${s.dc}15`,border:`1px solid ${s.dc}30`}}>🎵</div>
            <div style={{flex:1,textAlign:"left",minWidth:0}}>
              <div style={{fontWeight:700,fontSize:14}}>{s.title}</div>
              <div style={{color:"#666",fontSize:10,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.sub}</div>
              <div style={{display:"flex",gap:5,marginTop:3}}>
                <span style={{fontSize:9,padding:"1px 7px",borderRadius:20,background:`${s.dc}15`,color:s.dc,border:`1px solid ${s.dc}35`}}>{s.diff}</span>
                <span style={{fontSize:9,padding:"1px 6px",borderRadius:20,color:"#555",background:"rgba(255,255,255,.03)"}}>♩{s.bpm}</span>
                <span style={{fontSize:9,padding:"1px 6px",borderRadius:20,color:"#555",background:"rgba(255,255,255,.03)"}}>{s.notes.length} 음</span>
              </div>
            </div>
            <button onClick={e=>{e.stopPropagation();setSid(s.id);setSS(false);setAutoStart("demo");setView("play");}}
              title="데모 보기" aria-label="데모 보기"
              style={{background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.08)",color:"#aaa",borderRadius:8,width:32,height:32,fontSize:12,cursor:"pointer",fontFamily:"inherit",flexShrink:0}}>▶</button>
          </div>
        ))}
        <button className="card" style={{animationDelay:`${SONGS.length*.05}s`,borderColor:"#00f5d418",cursor:"pointer"}}
          onClick={()=>{setSid(null);setSS(false);setView("play")}}>
          <div style={{width:42,height:42,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0,background:"#00f5d410",border:"1px solid #00f5d425"}}>🎹</div>
          <div style={{flex:1,textAlign:"left"}}><div style={{fontWeight:700,fontSize:14}}>자유 연주</div><div style={{color:"#666",fontSize:10}}>Free Play — 채점 없이 자유롭게</div></div>
          <span style={{color:"#333"}}>›</span>
        </button>
        <div style={{textAlign:"center",color:"#333",fontSize:10,marginTop:18,lineHeight:1.6}}>
          🎹 데스크톱: Z X C V B N M (흰건반) · S D G H J (검은건반)<br/>
          📱 모바일: 건반 터치 · 핀치로 줌<br/>
          ⚙ 설정에서 악기/배속/음량 조절
        </div>
      </div>
      {showSettings && <SettingsModal
        instrument={instrument} setInstrument={setInstrument}
        speed={speed} setSpeed={setSpeed}
        volume={volume} setVolume={setVolume}
        showNames={showNames} setShowNames={setShowNames}
        showQwerty={showQwerty} setShowQwerty={setShowQwerty}
        onClose={()=>setShowSettings(false)} />}
    </div>
  );

  /* ══ RESULT ══ */
  if(view==="result"){
    const song=SONGS.find(s=>s.id===sid),total=song?.notes.length||1;
    const acc=Math.round(((judges.perfect*100+judges.great*70+judges.good*40)/(total*100))*100);
    let grade="F",gc="#555";
    if(acc>=95){grade="S";gc="#00f5d4";}else if(acc>=85){grade="A";gc="#fee440";}
    else if(acc>=70){grade="B";gc="#a78bfa";}else if(acc>=55){grade="C";gc="#f97316";}
    else if(acc>=40){grade="D";gc="#f43f5e";}
    return(
      <div style={{minHeight:"100dvh",background:"linear-gradient(170deg,#06061a,#10082a 50%,#081420)",color:"#fff",fontFamily:"'Noto Sans KR',sans-serif",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px 16px"}}>
        <style>{CSS}</style>
        <div className="scaleIn" style={{width:110,height:110,borderRadius:"50%",border:`3px solid ${gc}`,background:`${gc}10`,boxShadow:`0 0 60px ${gc}20`,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <span style={{fontFamily:"'Playfair Display',serif",fontSize:56,fontWeight:900,color:gc}}>{grade}</span>
        </div>
        <h2 style={{fontWeight:700,fontSize:19,marginTop:16}}>{song?.title}</h2>
        <p style={{color:"#666",fontSize:12,margin:"4px 0 20px"}}>정확도 {acc}%</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,width:"100%",maxWidth:320}}>
          <div style={{background:"rgba(255,255,255,.04)",borderRadius:12,padding:10,textAlign:"center"}}><div style={{fontSize:24,fontWeight:900,color:"#00f5d4"}}>{score.toLocaleString()}</div><div style={{fontSize:9,color:"#555"}}>SCORE</div></div>
          <div style={{background:"rgba(255,255,255,.04)",borderRadius:12,padding:10,textAlign:"center"}}><div style={{fontSize:24,fontWeight:900,color:"#fee440"}}>{maxCombo}x</div><div style={{fontSize:9,color:"#555"}}>MAX COMBO</div></div>
          {["perfect","great","good","miss"].map(k=>(
            <div key={k} style={{background:"rgba(255,255,255,.025)",borderRadius:10,padding:"7px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{color:JC[k],fontWeight:700,fontSize:11}}>{JT[k]}</span><span style={{fontWeight:800,fontSize:15}}>{judges[k]}</span></div>
          ))}
        </div>
        <div style={{display:"flex",gap:10,marginTop:24}}>
          <button onClick={()=>{setView("play");setSS(false);setTimeout(startSong,200)}} style={{padding:"10px 22px",borderRadius:12,border:"none",background:"linear-gradient(135deg,#7b61ff,#5a3fd4)",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>🔄 다시</button>
          <button onClick={()=>{stopGame();setView("menu")}} style={{padding:"10px 22px",borderRadius:12,border:"1px solid rgba(255,255,255,.08)",background:"rgba(255,255,255,.04)",color:"#ddd",fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>📋 곡 선택</button>
        </div>
      </div>
    );
  }

  /* ══════════════════════════════════════════════
     🎹 PLAY SCREEN — 핵심: 단일 스크롤 컨테이너!
     건반과 떨어지는 노트가 같은 스크롤 안에 있음
     ══════════════════════════════════════════════ */
  const song = sid ? SONGS.find(s=>s.id===sid) : null;

  return(
    <div style={{height:"100dvh",background:"#08080e",color:"#fff",fontFamily:"'Noto Sans KR',sans-serif",display:"flex",flexDirection:"column",overflow:"hidden",userSelect:"none",WebkitUserSelect:"none"}}
      onTouchStart={onTS} onTouchMove={onTM}>
      <style>{CSS}</style>

      {/* 상단바 */}
      <div style={{display:"flex",alignItems:"center",padding:"max(4px,env(safe-area-inset-top)) 8px 4px",background:"rgba(0,0,0,.7)",borderBottom:"1px solid rgba(255,255,255,.04)",flexShrink:0,zIndex:100,gap:4}}>
        <button onClick={()=>{stopGame();setView("menu")}} aria-label="뒤로" style={{background:"rgba(255,255,255,.06)",border:"none",color:"#999",borderRadius:8,width:30,height:30,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
        {song && playing && (
          <button onClick={pauseGame} aria-label={paused?"재생":"일시정지"} style={{background:"rgba(255,255,255,.06)",border:"none",color:"#ccc",borderRadius:8,width:30,height:30,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>{paused?"▶":"⏸"}</button>
        )}
        <div style={{flex:1,textAlign:"center",minWidth:0}}>
          <div style={{fontSize:12,fontWeight:600,color:"#bbb",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{song?.title||"자유 연주"}{demoMode && " · DEMO"}</div>
          {song && <div style={{fontSize:8,color:"#555"}}>{INSTRUMENTS.find(i=>i.id===instrument)?.label} · {speed}x</div>}
        </div>
        <button onClick={()=>setShowSettings(true)} aria-label="설정" style={{background:"rgba(255,255,255,.06)",border:"none",color:"#ccc",borderRadius:7,width:28,height:28,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>⚙</button>
        <button onClick={()=>setZoom(z=>Math.max(.5,+(z-.15).toFixed(2)))} aria-label="축소" style={{background:"rgba(255,255,255,.06)",border:"none",color:"#ccc",borderRadius:7,width:28,height:28,fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
        <span style={{fontSize:9,color:"#555",width:28,textAlign:"center"}}>{Math.round(zoom*100)}%</span>
        <button onClick={()=>setZoom(z=>Math.min(2.5,+(z+.15).toFixed(2)))} aria-label="확대" style={{background:"rgba(255,255,255,.06)",border:"none",color:"#ccc",borderRadius:7,width:28,height:28,fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
      </div>

      {/* 점수바 + 프로그레스 */}
      {song&&(
        <div style={{background:"rgba(0,0,0,.4)",flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",padding:"2px 8px"}}>
            <div style={{textAlign:"center",width:56}}>
              <div style={{fontSize:8,color:"#444",letterSpacing:1.5,fontWeight:600}}>SCORE</div>
              <div style={{fontSize:15,fontWeight:900,color:"#00f5d4"}}>{score.toLocaleString()}</div>
            </div>
            <div style={{flex:1,textAlign:"center",minHeight:28,display:"flex",alignItems:"center",justifyContent:"center"}}>
              {ja&&<div key={ja.key} className="popJ" style={{color:JC[ja.type],fontWeight:900,fontSize:18,letterSpacing:2,textShadow:`0 0 14px ${JC[ja.type]}55`}}>{JT[ja.type]}</div>}
            </div>
            <div style={{textAlign:"center",width:56}}>
              <div style={{fontSize:8,color:"#444",letterSpacing:1.5,fontWeight:600}}>COMBO</div>
              <div style={{fontSize:15,fontWeight:900,color:combo>=10?"#fee440":"#aaa"}}>{combo}x</div>
            </div>
          </div>
          {/* Progress bar */}
          {(() => {
            const lastN = song.notes[song.notes.length-1];
            const total = lastN.t + lastN.d;
            const prog = Math.max(0, Math.min(1, gt / total));
            return (
              <div style={{height:3,background:"rgba(255,255,255,.04)",position:"relative"}}>
                <div style={{position:"absolute",left:0,top:0,bottom:0,width:`${prog*100}%`,background:"linear-gradient(90deg,#00f5d4,#7b61ff)",transition:"width .1s linear",boxShadow:"0 0 8px #00f5d455"}}/>
              </div>
            );
          })()}
        </div>
      )}

      {/* ★★★ 메인 영역: 하나의 스크롤 컨테이너 안에 모든 것! ★★★ */}
      <div ref={scrollRef} style={{
        flex: 1,
        overflowX: "auto",
        overflowY: "hidden",
        position: "relative",
        WebkitOverflowScrolling: "touch",
      }}>
        {/* 전체 넓이를 가진 내부 컨테이너 - 높이는 100% */}
        <div style={{
          width: totalW,
          height: "100%",
          position: "relative",
        }}>

          {/* ── 가이드라인 (판정선): 건반 바로 위 ── */}
          <div style={{
            position:"absolute",
            bottom: kh,
            left: 0,
            width: totalW,
            height: 3,
            background:"linear-gradient(90deg,#00f5d400,#00f5d4cc 10%,#00f5d4 50%,#00f5d4cc 90%,#00f5d400)",
            zIndex: 40,
            boxShadow:"0 0 12px #00f5d455, 0 -4px 20px #00f5d418",
          }}/>

          {/* ── 떨어지는 노트들! ── 
              핵심: bottom = kh + timeUntil * PPS
              timeUntil > 0 → 건반 위 (아직 안 내려옴)
              timeUntil = 0 → 가이드라인 위치 (치는 타이밍)
              timeUntil < 0 → 건반 아래 (놓침)
          */}
          {song && isActive && song.notes.map((n, i) => {
            if(hnR.current.has(i)) return null;
            const timeUntil = n.t - gt;
            if(timeUntil > 6 || timeUntil < -1) return null;

            const x = getKeyX(n.m);
            const ib = isBk(n.m);
            const w = ib ? bkw - 2 : kw - 4;
            const h = Math.max(n.d * PPS, 16);
            const bot = kh + timeUntil * PPS;
            const clr = nClr(n.m);
            const {note} = m2n(n.m);

            return <div key={`n${i}`} style={{
              position: "absolute",
              left: x + (ib ? 1 : 2),
              bottom: bot,
              width: w,
              height: h,
              background: `linear-gradient(180deg, ${clr}, ${clr}aa)`,
              borderRadius: 6,
              border: `2px solid ${clr}`,
              boxShadow: `0 0 14px ${clr}66, inset 0 2px 0 rgba(255,255,255,.3)`,
              zIndex: ib ? 35 : 25,
              pointerEvents: "none",
              opacity: timeUntil < 0 ? Math.max(0, 1+timeUntil*3) : 1,
              display: "flex", alignItems: "flex-end", justifyContent: "center",
              paddingBottom: 3,
              fontSize: Math.max(8, 10*zoom),
              fontWeight: 800,
              color: ib ? "#fff" : "#1a1a2a",
              textShadow: ib ? "0 1px 2px rgba(0,0,0,.4)" : "0 1px 0 rgba(255,255,255,.4)",
              letterSpacing: 0.5,
            }}>{showNames && h >= 14 ? note.replace("#","♯") : ""}</div>;
          })}

          {/* Particle effects at key positions */}
          {particles.map(p => {
            const x = getKeyX(p.midi) + (isBk(p.midi) ? bkw/2 : kw/2);
            return <div key={p.id} className="hitParticle" style={{
              position:"absolute",
              left: x,
              bottom: kh + 10,
              background: p.color,
              boxShadow: `0 0 8px ${p.color}`,
              zIndex: 50,
              "--dx": `${p.dx}px`,
              "--dy": `${p.dy}px`,
            }}/>;
          })}

          {/* ── 흰 건반 ── */}
          {whites.map((k,i)=>{
            const isP=!!pressed[k.midi];
            return <div key={k.midi} data-midi={k.midi}
              onPointerDown={onPD} onPointerUp={onPU} onPointerCancel={onPU} onPointerLeave={onPU}
              style={{
                position:"absolute", bottom:0, left:i*kw, width:kw-1, height:kh,
                background:isP?"linear-gradient(180deg,#b8f5e8,#88e8d0 40%,#70d4bc)":"linear-gradient(180deg,#f5f5f5,#e0e0e0 50%,#ccc)",
                borderRadius:`0 0 ${4*zoom}px ${4*zoom}px`,
                borderLeft:"1px solid #bbb",borderRight:"1px solid #bbb",
                borderBottom:isP?"3px solid #00d4aa":"3px solid #aaa",
                zIndex:10,cursor:"pointer",touchAction:"none",
                display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end",
                paddingBottom:4*zoom,
                boxShadow:isP?"0 0 18px rgba(0,213,170,.35),inset 0 -4px 10px rgba(0,213,170,.15)":"inset 0 -4px 8px rgba(0,0,0,.04)",
                transition:"background .05s",
              }}>
              {zoom>=.55&&k.note==="C"&&<span style={{fontSize:Math.max(7,9*zoom),pointerEvents:"none",color:isP?"#00866a":"#999",fontWeight:700}}>C{k.oct}</span>}
            </div>;
          })}

          {/* ── 검은 건반 ── */}
          {blacks.map(k=>{
            const isP=!!pressed[k.midi];
            const ni=NN.indexOf(k.note),oo=k.oct-m2n(startMidi).oct;
            const x=(oo*7+BKO[ni])*kw;
            return <div key={k.midi} data-midi={k.midi}
              onPointerDown={e=>{e.stopPropagation();onPD(e)}} onPointerUp={onPU} onPointerCancel={onPU} onPointerLeave={onPU}
              style={{
                position:"absolute",bottom:kh-bkh,left:x,width:bkw,height:bkh,
                background:isP?"linear-gradient(180deg,#5a4f8a,#3a3260 60%,#2a2448)":"linear-gradient(180deg,#2a2a2e,#1a1a1e 50%,#111114)",
                borderRadius:`0 0 ${3*zoom}px ${3*zoom}px`,
                border:isP?"1px solid #7b6fbf":"1px solid #000",
                zIndex:20,cursor:"pointer",touchAction:"none",
                boxShadow:isP?"0 0 14px rgba(123,111,191,.4)":"0 3px 6px rgba(0,0,0,.6),inset 0 -3px 4px rgba(0,0,0,.4)",
                transition:"background .05s",
              }}/>;
          })}

          {/* ── 옥타브 구분선 (워터폴 배경) ── */}
          {whites.map((_,i)=>i%7===0&&<div key={`g${i}`} style={{
            position:"absolute",left:i*kw,top:0,bottom:kh,width:1,
            background:"rgba(255,255,255,.03)",zIndex:0
          }}/>)}
        </div>
      </div>

      {/* 시작/카운트다운 오버레이 */}
      {song&&showStart&&!playing&&!cd&&(
        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,background:"rgba(6,6,20,.8)",backdropFilter:"blur(4px)"}}>
          <div style={{textAlign:"center",padding:"0 20px"}}>
            <div style={{fontSize:17,fontWeight:700,color:"#ddd",marginBottom:6}}>{song.title}</div>
            <div style={{fontSize:11,color:"#666",marginBottom:16}}>{song.sub}</div>
            <div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:12}}>
              <button onClick={()=>startSong(false)} className="pulse" style={{padding:"12px 30px",borderRadius:50,border:"none",background:"linear-gradient(135deg,#00f5d4,#00c49d)",color:"#060618",fontWeight:800,fontSize:14,cursor:"pointer",boxShadow:"0 0 30px #00f5d422",fontFamily:"inherit"}}>▶ 연주 시작</button>
              <button onClick={()=>startSong(true)} style={{padding:"12px 20px",borderRadius:50,border:"1px solid rgba(255,255,255,.12)",background:"rgba(255,255,255,.04)",color:"#ddd",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>📺 데모</button>
            </div>
            <div style={{fontSize:10,color:"#444"}}>건반 스크롤/줌 조절 후 시작 · 배속 {speed}x · {INSTRUMENTS.find(i=>i.id===instrument)?.label}</div>
          </div>
        </div>
      )}
      {cd&&(
        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,background:"rgba(6,6,20,.6)"}}>
          <div className="scaleIn" style={{fontSize:80,fontWeight:900,color:"#00f5d4",textShadow:"0 0 60px #00f5d433"}}>{cd}</div>
        </div>
      )}
      {paused && playing && (
        <div onClick={pauseGame} style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,background:"rgba(6,6,20,.75)",backdropFilter:"blur(4px)",cursor:"pointer"}}>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:60,color:"#00f5d4",marginBottom:10}}>⏸</div>
            <div style={{fontSize:13,color:"#aaa"}}>일시정지 — 터치하여 재개</div>
          </div>
        </div>
      )}

      {/* 하단 */}
      <div style={{padding:"3px 0",textAlign:"center",background:"rgba(0,0,0,.6)",flexShrink:0,fontSize:9,color:"#333",paddingBottom:"max(3px,env(safe-area-inset-bottom))"}}>
        🤏 핀치 줌 │ ← → 스크롤 │ Space 일시정지 │ Esc 뒤로
      </div>
      {showSettings && <SettingsModal
        instrument={instrument} setInstrument={setInstrument}
        speed={speed} setSpeed={setSpeed}
        volume={volume} setVolume={setVolume}
        showNames={showNames} setShowNames={setShowNames}
        showQwerty={showQwerty} setShowQwerty={setShowQwerty}
        onClose={()=>setShowSettings(false)} />}
    </div>
  );
}

function SettingsModal({instrument, setInstrument, speed, setSpeed, volume, setVolume, showNames, setShowNames, showQwerty, setShowQwerty, onClose}){
  return (
    <div className="modal" onClick={onClose}>
      <div className="modalBox" onClick={e=>e.stopPropagation()}>
        <h3>⚙ 설정</h3>
        <div className="row">
          <label>악기</label>
          <select value={instrument} onChange={e=>setInstrument(e.target.value)}>
            {INSTRUMENTS.map(i=><option key={i.id} value={i.id}>{i.label}</option>)}
          </select>
        </div>
        <div className="row">
          <label>배속 <span style={{color:"#00f5d4"}}>{speed.toFixed(2)}x</span></label>
          <input type="range" min="0.5" max="2" step="0.05" value={speed} onChange={e=>setSpeed(parseFloat(e.target.value))}/>
        </div>
        <div className="row">
          <label>음량 <span style={{color:"#00f5d4"}}>{Math.round(volume*100)}%</span></label>
          <input type="range" min="0" max="1" step="0.05" value={volume} onChange={e=>setVolume(parseFloat(e.target.value))}/>
        </div>
        <div className="row">
          <label>노트에 음이름 표시</label>
          <button className={"toggle" + (showNames?" on":"")} onClick={()=>setShowNames(v=>!v)} aria-label="노트 음이름"/>
        </div>
        <div className="row">
          <label>QWERTY 키보드 입력</label>
          <button className={"toggle" + (showQwerty?" on":"")} onClick={()=>setShowQwerty(v=>!v)} aria-label="키보드 입력"/>
        </div>
        <div style={{marginTop:16,fontSize:10,color:"#555",lineHeight:1.6}}>
          💡 QWERTY 팁: Z X C V B N M (C4 옥타브 흰건반), S D G H J (검은건반), Q W E R T Y U I (C5 옥타브)
        </div>
        <button onClick={onClose} style={{marginTop:14,width:"100%",padding:"10px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#00f5d4,#7b61ff)",color:"#060618",fontWeight:800,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>닫기</button>
      </div>
    </div>
  );
}

const CSS=`
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Playfair+Display:wght@700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{overscroll-behavior:none;overflow:hidden;background:#08080e}
.card{width:100%;background:rgba(255,255,255,.03);border-radius:14px;padding:12px 14px;margin-bottom:8px;border:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:12px;cursor:pointer;animation:slideUp .4s ease both;color:#fff;outline:none;font-family:inherit;font-size:inherit}
.card:active{transform:scale(.97)!important;opacity:.8}
@keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{0%{transform:scale(0);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes popJ{0%{transform:scale(.4)translateY(6px);opacity:0}40%{transform:scale(1.15)translateY(-2px);opacity:1}100%{transform:scale(1)translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.scaleIn{animation:scaleIn .45s cubic-bezier(.17,.67,.46,1.28)}
.popJ{animation:popJ .3s ease}
.pulse{animation:pulse 2s ease infinite}
@keyframes hitBurst{0%{transform:scale(0);opacity:1}100%{transform:scale(2.8);opacity:0}}
@keyframes particleUp{0%{transform:translate(-50%,0) scale(1);opacity:1}100%{transform:translate(calc(-50% + var(--dx,0px)),var(--dy,-60px)) scale(.2);opacity:0}}
@keyframes rippleOut{0%{transform:scale(.4);opacity:.9}100%{transform:scale(1.8);opacity:0}}
@keyframes glowBar{0%,100%{box-shadow:0 0 8px #00f5d455}50%{box-shadow:0 0 18px #00f5d499}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.fadeIn{animation:fadeIn .3s ease}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:300;padding:20px;animation:fadeIn .2s ease}
.modalBox{background:linear-gradient(160deg,#15152a,#0c0c1a);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:22px 20px;max-width:360px;width:100%;max-height:85dvh;overflow-y:auto;color:#fff}
.modalBox h3{font-family:'Playfair Display',serif;font-size:20px;font-weight:800;margin-bottom:14px;background:linear-gradient(135deg,#00f5d4,#7b61ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04);gap:10px}
.row:last-child{border-bottom:0}
.row label{font-size:12px;color:#bbb;font-weight:600}
.row select,.row input[type=range]{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:#fff;border-radius:8px;padding:6px 10px;font-size:12px;font-family:inherit;outline:none}
.row select{min-width:120px}
.row input[type=range]{flex:1;max-width:160px;padding:0}
.toggle{width:38px;height:22px;background:rgba(255,255,255,.1);border-radius:20px;position:relative;cursor:pointer;border:none;flex-shrink:0}
.toggle::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;background:#888;border-radius:50%;transition:all .2s}
.toggle.on{background:#00f5d433}
.toggle.on::after{background:#00f5d4;left:18px;box-shadow:0 0 10px #00f5d4aa}
.chip{padding:5px 11px;border-radius:20px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:#bbb;font-family:inherit;transition:all .15s}
.chip.active{background:linear-gradient(135deg,#00f5d4,#7b61ff);color:#060618;border-color:transparent}
.hitParticle{position:absolute;width:5px;height:5px;border-radius:50%;pointer-events:none;animation:particleUp .6s ease-out forwards}
.keyBurst{position:absolute;border-radius:50%;pointer-events:none;animation:hitBurst .4s ease-out forwards;border:2px solid currentColor}
::-webkit-scrollbar{height:0;width:0}
`;

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
